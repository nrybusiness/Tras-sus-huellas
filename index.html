<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#FFF9F2">
  <title>Tras Sus Huellas · Valle de Aburrá</title>
  <meta name="description" content="Ayudándolos a volver a casa. Plataforma de búsqueda de mascotas perdidas en Medellín.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --tsh-bg: #FFF9F2;
      --tsh-surface: #FFFFFF;
      --tsh-surface-2: #FEF3E7;
      --tsh-accent: #E07A5F;
      --tsh-accent-soft: #E78F73;
      --tsh-success: #2D5A27;
      --tsh-warning: #E6A017;
      --tsh-danger: #D9534F;
      --tsh-text: #4A3B32;
      --tsh-text-muted: #8B7A6B;
      --tsh-border: rgba(224, 122, 95, 0.15);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
      --shadow-md: 0 6px 16px rgba(0,0,0,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--tsh-bg);
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 8 Q32 0 40 12 Q44 24 32 32 Q20 36 14 24 Q10 12 20 8 Z' fill='rgba(224,122,95,0.03)'/%3E%3C/svg%3E");
      color: var(--tsh-text);
      font-family: 'Quicksand', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, .font-display {
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--tsh-surface-2); }
    ::-webkit-scrollbar-thumb { background: var(--tsh-accent); border-radius: 8px; }
    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
      100% { transform: translateY(0); }
    }
    .hover-float:hover { animation: float 0.4s ease-in-out; }
    .shadow-soft { box-shadow: var(--shadow-sm); }
  </style>
</head>
<body class="bg-tsh-bg text-tsh-text antialiased">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    // ⚠️ REEMPLAZAR CON LA URL DE TU WEB APP DE GAS
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwIjj7RQWHhYUTxPYzDoVaghh8LLngV5EFWVX_WZyIyRS44LBNm3z33niQhPbQPjYPE/exec';

    // Datos mock ELIMINADOS — solo reales desde backend

    const ZONAS = ['Medellín Centro','El Poblado','Laureles-Estadio','Belén','Robledo','Envigado','Itagüí','Sabaneta','Bello','Copacabana','La Estrella','Caldas','Barbosa','Girardota'];

    const formatDate = (dateStr) => {
      const diff = new Date() - new Date(dateStr);
      const hours = Math.floor(diff / 36e5);
      return hours < 24 ? `Hace ${hours} h` : `Hace ${Math.floor(hours/24)} d`;
    };

    const getWhatsAppLink = (phone, text) => `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;

    const resizeImage = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const MAX_WIDTH = 800;
          let width = img.width, height = img.height;
          if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.8));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    // ---------- COMPONENTES OPTIMIZADOS PARA MÓVIL ----------
    const Header = () => (
      <header className="sticky top-0 z-20 bg-white/80 backdrop-blur-md border-b border-[#E07A5F]/20 px-3 py-2 shadow-soft">
        <div className="max-w-7xl mx-auto flex items-center justify-between">
          <div className="flex items-center gap-1">
            <span className="text-2xl">🐾</span>
            <h1 className="text-lg font-display tracking-tight text-[#4A3B32]">
              Tras Sus <span className="text-[#E07A5F]">Huellas</span>
            </h1>
          </div>
          <span className="bg-[#FEF3E7] px-3 py-1 rounded-full text-xs font-medium text-[#8B7A6B] border border-[#E07A5F]/30">
            📍 Valle de Aburrá
          </span>
        </div>
      </header>
    );

    const HeroSection = ({ stats }) => {
      const [bienvenida, setBienvenida] = useState(null);
      useEffect(() => {
        if (GAS_URL) {
          fetch(`${GAS_URL}?action=bienvenida`).then(r=>r.json()).then(d=>{ if(d.ok) setBienvenida(d.data); }).catch(()=>{});
        }
      }, []);
      return (
        <section className="px-4 py-6 max-w-7xl mx-auto">
          <div className="text-center">
            <h2 className="text-3xl font-display leading-tight mb-2 text-[#4A3B32]">
              Ayudándolos a <br/><span className="text-[#E07A5F]">volver a casa</span>
            </h2>
            <p className="text-[#8B7A6B] text-base px-2">
              {bienvenida ? bienvenida.mensaje : 'Conectamos reportes de mascotas perdidas y avistadas.'}
            </p>
          </div>
          <div className="flex justify-around mt-6">
            <div className="text-center"><div className="text-2xl font-display text-[#E07A5F]">{stats.totalPerdidos}</div><div className="text-xs text-[#8B7A6B]">Perdidos</div></div>
            <div className="text-center"><div className="text-2xl font-display text-[#E6A017]">{stats.totalAvistamientos}</div><div className="text-xs text-[#8B7A6B]">Avistados</div></div>
            <div className="text-center"><div className="text-2xl font-display text-[#2D5A27]">{stats.resueltos}</div><div className="text-xs text-[#8B7A6B]">Reencuentros</div></div>
          </div>
        </section>
      );
    };

    const TabNavigator = ({ activeTab, setActiveTab }) => {
      const tabs = [
        { id: 'perdidos', label: 'Perdidos', icon: '🐕' },
        { id: 'avistamientos', label: 'Avistados', icon: '🐈' },
        { id: 'reportar', label: 'Reportar', icon: '📋' }
      ];
      return (
        <div className="border-b border-[#E07A5F]/20">
          <div className="max-w-7xl mx-auto px-2 flex justify-around">
            {tabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 py-2 text-sm font-medium flex items-center justify-center gap-1 border-b-2 ${activeTab === tab.id ? 'border-[#E07A5F] text-[#E07A5F]' : 'border-transparent text-[#8B7A6B]'}`}>
                <span className="text-base">{tab.icon}</span> <span className="hidden xs:inline">{tab.label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    };

    const FilterBar = ({ filters, setFilters }) => (
      <div className="bg-white p-3 rounded-2xl shadow-soft mb-4 flex flex-wrap gap-2 items-end border border-[#E07A5F]/10">
        <div className="flex-1 min-w-[110px]">
          <label className="block text-xs font-medium text-[#8B7A6B] mb-1">Especie</label>
          <select className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-xl px-2 py-2 text-sm" value={filters.especie} onChange={(e) => setFilters({...filters, especie: e.target.value})}>
            <option value="todos">Todos</option><option value="perro">🐕 Perros</option><option value="gato">🐈 Gatos</option>
          </select>
        </div>
        <div className="flex-1 min-w-[130px]">
          <label className="block text-xs font-medium text-[#8B7A6B] mb-1">Zona</label>
          <select className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-xl px-2 py-2 text-sm" value={filters.zona} onChange={(e) => setFilters({...filters, zona: e.target.value})}>
            <option value="todas">Todas</option>
            {ZONAS.map(z => <option key={z} value={z}>{z}</option>)}
          </select>
        </div>
        <div className="w-[100px]">
          <label className="block text-xs font-medium text-[#8B7A6B] mb-1">Orden</label>
          <select className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-xl px-2 py-2 text-sm" value={filters.sort} onChange={(e) => setFilters({...filters, sort: e.target.value})}>
            <option value="recientes">Recientes</option><option value="antiguos">Antiguos</option>
          </select>
        </div>
      </div>
    );

    const PetCard = ({ pet }) => {
      const text = `Hola, vi el reporte de ${pet.nombre || 'esta mascota'} en Tras Sus Huellas. ¿Podemos ayudarte?`;
      return (
        <div className="bg-white rounded-2xl overflow-hidden border border-[#E07A5F]/10 shadow-soft hover:shadow-md transition-all duration-200 hover-float">
          <div className="aspect-square bg-[#FEF3E7] flex items-center justify-center text-5xl">
            {pet.foto ? <img src={pet.foto} alt={pet.nombre} className="w-full h-full object-cover" /> : (pet.especie==='perro'?'🐕':'🐈')}
          </div>
          <div className="p-3">
            <div className="flex justify-between items-start mb-1">
              <h3 className="font-display text-base text-[#4A3B32] truncate">{pet.nombre || 'Sin nombre'}</h3>
              <span className={`px-2 py-0.5 rounded-full text-[10px] font-medium ${pet.estado==='PERDIDO'?'bg-[#D9534F]/10 text-[#D9534F]':'bg-[#E6A017]/10 text-[#E6A017]'}`}>
                {pet.estado}
              </span>
            </div>
            <div className="flex flex-wrap gap-1 text-xs text-[#8B7A6B] mb-1">
              <span className="bg-[#FEF3E7] px-2 py-0.5 rounded-full">{pet.raza}</span>
              <span className="bg-[#FEF3E7] px-2 py-0.5 rounded-full">{pet.color}</span>
            </div>
            <p className="text-xs text-[#8B7A6B] flex items-center gap-1"><span>📍</span> {pet.zona}</p>
            <p className="text-[10px] text-[#8B7A6B] mb-2">{formatDate(pet.fecha)}</p>
            <a href={getWhatsAppLink(pet.contactoTelefono, text)} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-1 w-full bg-[#E07A5F] hover:bg-[#C86A50] text-white text-sm font-medium py-2 rounded-full transition-colors shadow-sm">
              <span>🧡</span> Contactar
            </a>
          </div>
        </div>
      );
    };

    const FeedView = ({ type }) => {
      const [pets, setPets] = useState([]);
      const [filters, setFilters] = useState({ especie: 'todos', zona: 'todas', sort: 'recientes' });
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(false);

      const loadData = useCallback(async () => {
        setLoading(true);
        setError(false);
        if (GAS_URL) {
          try {
            const res = await fetch(`${GAS_URL}?action=feed&type=${type}`);
            const json = await res.json();
            if (json.ok) {
              setPets(json.data);
            } else {
              setError(true);
            }
          } catch(e) {
            setError(true);
          }
        } else {
          setError(true);
        }
        setLoading(false);
      }, [type]);

      useEffect(() => { loadData(); }, [loadData]);

      const filtered = useMemo(() => {
        let f = [...pets];
        if (filters.especie !== 'todos') f = f.filter(p => p.especie === filters.especie);
        if (filters.zona !== 'todas') f = f.filter(p => p.zona === filters.zona);
        f.sort((a,b) => filters.sort === 'recientes' ? new Date(b.fecha) - new Date(a.fecha) : new Date(a.fecha) - new Date(b.fecha));
        return f;
      }, [pets, filters]);

      if (loading) return <div className="text-center py-12 text-[#8B7A6B]">🐾 Cargando reportes...</div>;
      if (error) return <div className="text-center py-12 text-[#8B7A6B]">⚠️ No pudimos cargar los datos. Intenta más tarde.</div>;

      return (
        <div className="max-w-7xl mx-auto px-3 py-4">
          <FilterBar filters={filters} setFilters={setFilters} />
          {filtered.length === 0 ? (
            <div className="text-center py-10 bg-white rounded-2xl shadow-soft p-6">
              <span className="text-4xl mb-3 block">🐾</span>
              <p className="text-[#8B7A6B]">Aún no hay reportes {type === 'perdidos' ? 'de mascotas perdidas' : 'de avistamientos'}.</p>
              <button onClick={() => document.querySelector('button[data-tab="reportar"]')?.click()} className="mt-4 bg-[#E07A5F] text-white px-6 py-2 rounded-full text-sm">
                Sé el primero en reportar
              </button>
            </div>
          ) : (
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
              {filtered.map(pet => <PetCard key={pet.id} pet={pet} />)}
            </div>
          )}
        </div>
      );
    };

    const ReportForm = ({ onMatchFound }) => {
      const [form, setForm] = useState({ type:'perdido', nombre:'', especie:'perro', raza:'', color:'Dorado', tamaño:'mediano', zona:'Medellín Centro', descripcion:'', foto:'', contactoNombre:'', contactoTelefono:'', fecha: new Date().toISOString().split('T')[0] });
      const [preview, setPreview] = useState(null);
      const [sending, setSending] = useState(false);
      const [processing, setProcessing] = useState(false);
      const [error, setError] = useState('');

      const handleChange = (field, value) => setForm(prev => ({...prev, [field]: value}));
      const handleImage = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        setProcessing(true);
        try { const b64 = await resizeImage(file); setPreview(b64); handleChange('foto', b64); } catch(e) { alert('Error con imagen'); } finally { setProcessing(false); }
      };
      const validate = () => {
        if (!form.zona || !form.contactoNombre || !form.contactoTelefono) { setError('Zona, nombre y teléfono son obligatorios'); return false; }
        setError(''); return true;
      };
      const submit = async (e) => {
        e.preventDefault(); if (!validate()) return;
        setSending(true);
        const payload = { action: 'reportar', type: form.type, data: { ...form } };
        if (GAS_URL) {
          try {
            const res = await fetch(GAS_URL, { method: 'POST', headers: {'Content-Type':'text/plain'}, body: JSON.stringify(payload) });
            const json = await res.json();
            if (json.ok) {
              onMatchFound({ reporte: payload.data, matches: json.matches || [] });
              // Resetear formulario (opcional)
            } else {
              alert('Error al enviar reporte');
            }
          } catch(e) {
            alert('Error de conexión');
          }
        } else {
          alert('Backend no configurado');
        }
        setSending(false);
      };
      return (
        <div className="max-w-lg mx-auto px-3 py-4">
          <h2 className="text-2xl font-display mb-3 text-[#4A3B32] flex items-center gap-2"><span>📋</span> Reportar mascota</h2>
          <form onSubmit={submit} className="bg-white p-4 rounded-2xl shadow-soft border border-[#E07A5F]/10 space-y-4">
            <div className="flex gap-2">
              <button type="button" onClick={()=>handleChange('type','perdido')} className={`flex-1 py-2 rounded-full border-2 text-sm font-medium ${form.type==='perdido'?'border-[#E07A5F] bg-[#E07A5F]/10 text-[#E07A5F]':'border-[#E07A5F]/20 text-[#8B7A6B]'}`}>🐕 Perdí</button>
              <button type="button" onClick={()=>handleChange('type','avistamiento')} className={`flex-1 py-2 rounded-full border-2 text-sm font-medium ${form.type==='avistamiento'?'border-[#E07A5F] bg-[#E07A5F]/10 text-[#E07A5F]':'border-[#E07A5F]/20 text-[#8B7A6B]'}`}>🐈 Avisté</button>
            </div>
            <div className="space-y-3">
              <input placeholder="Nombre (opcional)" value={form.nombre} onChange={e=>handleChange('nombre',e.target.value)} className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-4 py-2 text-sm" />
              <div className="grid grid-cols-2 gap-2">
                <select value={form.especie} onChange={e=>handleChange('especie',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-3 py-2 text-sm"><option>perro</option><option>gato</option></select>
                <input placeholder="Raza" value={form.raza} onChange={e=>handleChange('raza',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-3 py-2 text-sm" />
              </div>
              <div className="grid grid-cols-2 gap-2">
                <select value={form.color} onChange={e=>handleChange('color',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-3 py-2 text-sm"><option>Dorado</option><option>Negro</option><option>Blanco</option><option>Café</option><option>Gris</option><option>Manchado</option></select>
                <select value={form.tamaño} onChange={e=>handleChange('tamaño',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-3 py-2 text-sm"><option>pequeño</option><option>mediano</option><option>grande</option></select>
              </div>
              <select value={form.zona} onChange={e=>handleChange('zona',e.target.value)} className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-4 py-2 text-sm">{ZONAS.map(z=><option key={z}>{z}</option>)}</select>
              <textarea placeholder="Descripción" value={form.descripcion} onChange={e=>handleChange('descripcion',e.target.value)} className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-2xl px-4 py-2 text-sm" rows="2"></textarea>
              <div><label className="block mb-1 text-xs font-medium text-[#8B7A6B]">📸 Foto</label><input type="file" accept="image/*" onChange={handleImage} disabled={processing} className="block w-full text-xs file:mr-3 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:bg-[#E07A5F] file:text-white" />{preview && <img src={preview} className="mt-2 w-20 h-20 object-cover rounded-xl border border-[#E07A5F]/20" />}</div>
              <div className="grid grid-cols-2 gap-2">
                <input placeholder="Tu nombre *" value={form.contactoNombre} onChange={e=>handleChange('contactoNombre',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-3 py-2 text-sm" required />
                <input placeholder="Teléfono (+57) *" value={form.contactoTelefono} onChange={e=>handleChange('contactoTelefono',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-3 py-2 text-sm" required />
              </div>
              <input type="date" value={form.fecha} onChange={e=>handleChange('fecha',e.target.value)} className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-4 py-2 text-sm" />
              {error && <p className="text-[#D9534F] text-xs">{error}</p>}
            </div>
            <button type="submit" disabled={sending||processing} className="w-full bg-[#E07A5F] hover:bg-[#C86A50] text-white font-display text-base py-3 rounded-full shadow-md transition flex items-center justify-center gap-2">✨ Publicar reporte</button>
          </form>
        </div>
      );
    };

    const MatchView = ({ reporte, matches, onClose }) => (
      <div className="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center p-3 z-50">
        <div className="bg-white rounded-2xl w-full max-w-md max-h-[80vh] overflow-auto p-4 shadow-soft border border-[#E07A5F]/20">
          <div className="flex justify-between items-center mb-3"><h3 className="text-xl font-display text-[#4A3B32]">🎉 ¡Posibles matches!</h3><button onClick={onClose} className="text-2xl text-[#8B7A6B]">&times;</button></div>
          {matches.length===0 ? <p className="text-[#8B7A6B] text-sm">Aún no hay coincidencias.</p> : matches.map((m,i)=>(
            <div key={i} className="bg-[#FFF9F2] p-3 rounded-xl border border-[#E07A5F]/10 mb-3">
              <div className="flex justify-between mb-1"><span className="font-display">{m.pet.nombre||'Mascota'}</span><span className="bg-[#E07A5F]/10 text-[#E07A5F] px-2 py-0.5 rounded-full text-xs">{m.score}%</span></div>
              <p className="text-xs text-[#8B7A6B]">🐾 {m.pet.raza} · 📍 {m.pet.zona}</p>
              <a href={getWhatsAppLink(m.pet.contactoTelefono, `🐾 ¡Posible match! Vi a ${m.pet.nombre||'tu mascota'} en ${m.pet.zona}.`)} target="_blank" className="mt-2 inline-flex items-center gap-1 bg-[#2D5A27] text-white px-3 py-1.5 rounded-full text-xs">🧡 Contactar</a>
            </div>
          ))}
          <button onClick={onClose} className="mt-2 w-full border border-[#E07A5F]/30 py-2 rounded-full text-sm text-[#8B7A6B]">Cerrar</button>
        </div>
      </div>
    );

    const HowItWorks = () => (
      <section className="py-10 px-3 bg-[#FEF3E7]/50"><div className="max-w-7xl mx-auto text-center"><h2 className="text-2xl font-display mb-6 text-[#4A3B32]">¿Cómo ayudamos?</h2><div className="grid grid-cols-3 gap-2"><div className="bg-white p-3 rounded-xl shadow-soft"><div className="text-3xl mb-1">📸</div><h3 className="font-display text-sm mb-1">Reporta</h3><p className="text-[10px] text-[#8B7A6B]">Sube foto</p></div><div className="bg-white p-3 rounded-xl shadow-soft"><div className="text-3xl mb-1">🔍</div><h3 className="font-display text-sm mb-1">Match</h3><p className="text-[10px] text-[#8B7A6B]">Coincidencias</p></div><div className="bg-white p-3 rounded-xl shadow-soft"><div className="text-3xl mb-1">🧡</div><h3 className="font-display text-sm mb-1">Reencuentro</h3><p className="text-[10px] text-[#8B7A6B]">WhatsApp</p></div></div></div></section>
    );

    const Footer = () => (
      <footer className="border-t border-[#E07A5F]/20 py-5 px-3 bg-white"><div className="max-w-7xl mx-auto text-center text-[#8B7A6B] text-xs"><p>🐾 Tras Sus Huellas · Valle de Aburrá</p><p className="mt-1">Hecho con 🧡 por <a href="https://rakontech.vercel.app" className="text-[#E07A5F] hover:underline">Rakon Tech</a>.</p><p className="mt-1 text-[10px]">© 2026 · Medellín, Colombia</p></div></footer>
    );

    const App = () => {
      const [activeTab, setActiveTab] = useState('perdidos');
      const [stats, setStats] = useState({ totalPerdidos: 0, totalAvistamientos: 0, resueltos: 0 });
      const [matchModal, setMatchModal] = useState(null);

      useEffect(() => {
        (async () => {
          if (GAS_URL) {
            try { const r = await fetch(`${GAS_URL}?action=stats`); const j = await r.json(); if (j.ok) setStats(j.data); } catch(e) {}
          }
        })();
      }, []);

      return (
        <div className="min-h-screen flex flex-col">
          <Header />
          <HeroSection stats={stats} />
          <TabNavigator activeTab={activeTab} setActiveTab={setActiveTab} />
          <main className="flex-1">
            {activeTab==='perdidos' && <FeedView type="perdidos" />}
            {activeTab==='avistamientos' && <FeedView type="avistamientos" />}
            {activeTab==='reportar' && <ReportForm onMatchFound={setMatchModal} />}
          </main>
          <HowItWorks />
          <Footer />
          {matchModal && <MatchView {...matchModal} onClose={()=>setMatchModal(null)} />}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
