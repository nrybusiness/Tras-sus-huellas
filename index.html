<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#FFF9F2">
  <title>Tras Sus Huellas · Valle de Aburrá</title>
  <meta name="description" content="Ayudándolos a volver a casa. Plataforma de búsqueda de mascotas perdidas en Medellín.">
  <link rel="icon" type="image/png" href="https://i.postimg.cc/0NtVFHpM/20-4-2026-1-32-05-a-m.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --tsh-bg: #FFF9F2;
      --tsh-surface: #FFFFFF;
      --tsh-surface-2: #FEF3E7;
      --tsh-accent: #E07A5F;
      --tsh-accent-soft: #E78F73;
      --tsh-success: #2D5A27;
      --tsh-warning: #E6A017;
      --tsh-danger: #D9534F;
      --tsh-urgencia: #B91C1C;
      --tsh-adopcion: #15803D;
      --tsh-text: #4A3B32;
      --tsh-text-muted: #8B7A6B;
      --tsh-border: rgba(224, 122, 95, 0.15);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
      --shadow-md: 0 6px 16px rgba(0,0,0,0.06);
      --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--tsh-bg);
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 8 Q32 0 40 12 Q44 24 32 32 Q20 36 14 24 Q10 12 20 8 Z' fill='rgba(224,122,95,0.03)'/%3E%3C/svg%3E");
      color: var(--tsh-text);
      font-family: 'Quicksand', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, .font-display {
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--tsh-surface-2); }
    ::-webkit-scrollbar-thumb { background: var(--tsh-accent); border-radius: 8px; }
  </style>
</head>
<body class="bg-tsh-bg text-tsh-text antialiased">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    // ⚠️ REEMPLAZAR CON LA URL DE TU WEB APP DE GAS
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwIjj7RQWHhYUTxPYzDoVaghh8LLngV5EFWVX_WZyIyRS44LBNm3z33niQhPbQPjYPE/exec';

    const ZONAS = ['Medellín Centro','El Poblado','Laureles-Estadio','Belén','Robledo','Envigado','Itagüí','Sabaneta','Bello','Copacabana','La Estrella','Caldas','Barbosa','Girardota'];

    const formatDate = (dateStr) => {
      const diff = new Date() - new Date(dateStr);
      const hours = Math.floor(diff / 36e5);
      return hours < 24 ? `Hace ${hours} h` : `Hace ${Math.floor(hours/24)} d`;
    };

    const getWhatsAppLink = (phone, text) => `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;

    const resizeImage = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const MAX_WIDTH = 800;
          let width = img.width, height = img.height;
          if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.8));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    // ---------- COMPONENTES ----------
    const Header = ({ stats }) => (
      <header className="sticky top-0 z-20 bg-white/90 backdrop-blur-md border-b border-[#E07A5F]/20 px-3 py-2 shadow-soft">
        <div className="max-w-7xl mx-auto flex items-center justify-between">
          <div className="flex items-center gap-2">
            <img 
              src="https://i.postimg.cc/25TDRnD3/f92e3e84-56ac-491e-b4c6-88d99d578808.png" 
              alt="Tras Sus Huellas" 
              className="w-8 h-8 object-contain"
            />
            <h1 className="text-lg font-display tracking-tight text-[#4A3B32]">
              Tras Sus <span className="text-[#E07A5F]">Huellas</span>
            </h1>
          </div>
          <div className="flex items-center gap-3">
            <div className="flex items-center gap-3 text-xs">
              <div className="text-center"><span className="font-display text-[#E07A5F]">{stats.totalPerdidos}</span><span className="ml-1 text-[#8B7A6B]">🔴</span></div>
              <div className="text-center"><span className="font-display text-[#E6A017]">{stats.totalAvistamientos}</span><span className="ml-1 text-[#8B7A6B]">🟡</span></div>
              <div className="text-center"><span className="font-display text-[#2D5A27]">{stats.resueltos}</span><span className="ml-1 text-[#8B7A6B]">✅</span></div>
            </div>
            <span className="bg-[#FEF3E7] px-2 py-0.5 rounded-full text-[10px] font-medium text-[#8B7A6B] border border-[#E07A5F]/30">
              Valle de Aburrá
            </span>
          </div>
        </div>
      </header>
    );

    const BottomNavigation = ({ activeTab, setActiveTab }) => {
      const tabs = [
        { id: 'perdidos', label: 'Perdidos', icon: '🔴' },
        { id: 'avistamientos', label: 'Avistados', icon: '🟡' }
      ];
      return (
        <div className="fixed bottom-0 left-0 right-0 z-30 bg-white/90 backdrop-blur-md border-t border-[#E07A5F]/20 px-4 py-2 safe-area-inset-bottom">
          <div className="max-w-7xl mx-auto flex justify-around items-center">
            {tabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center py-1 px-4 rounded-full transition ${activeTab === tab.id ? 'text-[#E07A5F]' : 'text-[#8B7A6B]'}`}>
                <span className="text-xl">{tab.icon}</span>
                <span className="text-[10px] font-medium">{tab.label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    };

    const FloatingActionButton = ({ setActiveTab }) => (
      <button
        onClick={() => setActiveTab('reportar')}
        className="fixed bottom-20 right-5 z-40 w-14 h-14 rounded-full bg-[#E07A5F] text-white shadow-lg flex items-center justify-center text-2xl hover:bg-[#C86A50] transition-all active:scale-95"
        style={{ boxShadow: '0 8px 20px rgba(224,122,95,0.4)' }}
      >
        <span>📋</span>
      </button>
    );

    const FilterBar = ({ filters, setFilters }) => (
      <div className="bg-white p-3 rounded-2xl shadow-soft mb-4 flex flex-wrap gap-2 items-end border border-[#E07A5F]/10">
        <div className="flex-1 min-w-[110px]">
          <label className="block text-xs font-medium text-[#8B7A6B] mb-1">Especie</label>
          <select className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-xl px-2 py-2 text-sm" value={filters.especie} onChange={(e) => setFilters({...filters, especie: e.target.value})}>
            <option value="todos">Todos</option>
            <option value="perro">🐕 Perros</option>
            <option value="gato">🐈 Gatos</option>
            <option value="otro">🐾 Otro</option>
          </select>
        </div>
        <div className="flex-1 min-w-[130px]">
          <label className="block text-xs font-medium text-[#8B7A6B] mb-1">Categoría</label>
          <select className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-xl px-2 py-2 text-sm" value={filters.categoria} onChange={(e) => setFilters({...filters, categoria: e.target.value})}>
            <option value="todas">Todas</option>
            <option value="perdido">🔴 Perdidos</option>
            <option value="avistamiento">🟡 Avistados</option>
            <option value="urgencia">🚨 Urgencias</option>
            <option value="adopcion">🏠 Adopción</option>
          </select>
        </div>
        <div className="flex-1 min-w-[130px]">
          <label className="block text-xs font-medium text-[#8B7A6B] mb-1">Zona</label>
          <select className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-xl px-2 py-2 text-sm" value={filters.zona} onChange={(e) => setFilters({...filters, zona: e.target.value})}>
            <option value="todas">Todas</option>
            {ZONAS.map(z => <option key={z} value={z}>{z}</option>)}
          </select>
        </div>
      </div>
    );

    const PetCard = ({ pet, onOpenDetail }) => {
      const categoriaConfig = {
        perdido: { bg: 'bg-[#D9534F]', text: 'PERDIDO', icon: '🔴' },
        avistamiento: { bg: 'bg-[#E6A017]', text: 'AVISTADO', icon: '🟡' },
        urgencia: { bg: 'bg-[#B91C1C]', text: '🚨 URGENTE', icon: '🚨' },
        adopcion: { bg: 'bg-[#15803D]', text: '🏠 ADOPCIÓN', icon: '🏠' }
      };
      const cat = categoriaConfig[pet.categoria] || { bg: 'bg-gray-500', text: pet.categoria?.toUpperCase(), icon: '📌' };
      const whatsappText = `Hola, vi el reporte de ${pet.nombre || 'esta mascota'} (${cat.text}) en Tras Sus Huellas. ¿Podemos ayudar?`;
      
      const handleCardClick = (e) => {
        if (e.target.closest('a')) return;
        onOpenDetail(pet);
      };

      return (
        <div 
          className="bg-white rounded-2xl overflow-hidden border border-[#E07A5F]/10 shadow-soft hover:shadow-md transition-all duration-200 cursor-pointer"
          onClick={handleCardClick}
        >
          <div className="relative aspect-square bg-[#FEF3E7]">
            {pet.foto ? <img src={pet.foto} alt={pet.nombre} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-6xl">{pet.especie==='perro'?'🐕':pet.especie==='gato'?'🐈':'🐾'}</div>}
            <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/60 to-transparent p-3">
              <h3 className="font-display text-white text-lg truncate">{pet.nombre || 'Sin nombre'}</h3>
              <p className="text-white/80 text-xs flex items-center gap-1"><span>📍</span> {pet.zona}</p>
            </div>
            <span className={`absolute top-2 right-2 px-2 py-0.5 rounded-full text-[10px] font-medium text-white ${cat.bg}`}>
              {cat.text}
            </span>
          </div>
          <div className="p-3">
            <div className="flex flex-wrap gap-1 text-xs text-[#8B7A6B] mb-1">
              <span className="bg-[#FEF3E7] px-2 py-0.5 rounded-full">{pet.raza || 'Raza desconocida'}</span>
              <span className="bg-[#FEF3E7] px-2 py-0.5 rounded-full">{pet.color || 'Color no especificado'}</span>
            </div>
            {pet.descripcion && (
              <p className="text-xs text-[#8B7A6B] mb-2 italic">"{pet.descripcion.length > 50 ? pet.descripcion.substring(0,50)+'…' : pet.descripcion}"</p>
            )}
            <p className="text-[10px] text-[#8B7A6B] mb-2">{formatDate(pet.fecha)}</p>
            <a 
              href={getWhatsAppLink(pet.contactoTelefono, whatsappText)} 
              target="_blank" 
              rel="noopener noreferrer" 
              className="flex items-center justify-center gap-1 w-full bg-[#E07A5F] hover:bg-[#C86A50] text-white text-sm font-medium py-2 rounded-full transition-colors shadow-sm"
            >
              <span>🧡</span> Contactar
            </a>
          </div>
        </div>
      );
    };

    const DetailView = ({ pet, onClose }) => {
      const categoriaConfig = {
        perdido: { bg: 'bg-[#D9534F]', text: 'PERDIDO', icon: '🔴' },
        avistamiento: { bg: 'bg-[#E6A017]', text: 'AVISTADO', icon: '🟡' },
        urgencia: { bg: 'bg-[#B91C1C]', text: '🚨 URGENTE', icon: '🚨' },
        adopcion: { bg: 'bg-[#15803D]', text: '🏠 ADOPCIÓN', icon: '🏠' }
      };
      const cat = categoriaConfig[pet.categoria] || { bg: 'bg-gray-500', text: pet.categoria?.toUpperCase(), icon: '📌' };
      const whatsappText = `Hola, vi el reporte de ${pet.nombre || 'esta mascota'} (${cat.text}) en Tras Sus Huellas. ¿Podemos ayudar?`;

      return (
        <div className="fixed inset-0 z-50 bg-[#FFF9F2] overflow-auto" onClick={onClose}>
          <div className="min-h-screen flex items-center justify-center p-4" onClick={e => e.stopPropagation()}>
            <div className="bg-white rounded-3xl shadow-lg max-w-lg w-full overflow-hidden border border-[#E07A5F]/20">
              <div className="relative aspect-video bg-[#FEF3E7]">
                {pet.foto ? (
                  <img src={pet.foto} alt={pet.nombre} className="w-full h-full object-contain" />
                ) : (
                  <div className="w-full h-full flex items-center justify-center text-8xl">
                    {pet.especie==='perro'?'🐕':pet.especie==='gato'?'🐈':'🐾'}
                  </div>
                )}
                <button 
                  onClick={onClose}
                  className="absolute top-3 right-3 w-8 h-8 rounded-full bg-white/90 backdrop-blur-sm flex items-center justify-center text-[#4A3B32] shadow-md"
                >
                  &times;
                </button>
                <span className={`absolute top-3 left-3 px-3 py-1 rounded-full text-xs font-medium text-white ${cat.bg}`}>
                  {cat.text}
                </span>
              </div>
              <div className="p-5">
                <div className="flex justify-between items-start mb-3">
                  <h2 className="text-2xl font-display text-[#4A3B32]">{pet.nombre || 'Sin nombre'}</h2>
                  <span className="text-sm text-[#8B7A6B]">{formatDate(pet.fecha)}</span>
                </div>
                
                <div className="space-y-3 mb-5">
                  <div className="flex items-center gap-2">
                    <span className="text-lg">{pet.especie==='perro'?'🐕':pet.especie==='gato'?'🐈':'🐾'}</span>
                    <span className="font-medium">{pet.raza || 'Raza no especificada'}</span>
                  </div>
                  <div className="grid grid-cols-2 gap-2 text-sm">
                    <div className="bg-[#FEF3E7] p-2 rounded-xl">
                      <span className="text-[#8B7A6B]">Color:</span> {pet.color || '—'}
                    </div>
                    <div className="bg-[#FEF3E7] p-2 rounded-xl">
                      <span className="text-[#8B7A6B]">Tamaño:</span> {pet.tamaño || '—'}
                    </div>
                  </div>
                  <div className="bg-[#FEF3E7] p-3 rounded-xl">
                    <span className="text-[#8B7A6B] block mb-1">📍 Zona</span>
                    <span className="font-medium">{pet.zona}</span>
                  </div>
                  {pet.descripcion && (
                    <div className="bg-[#FEF3E7] p-3 rounded-xl">
                      <span className="text-[#8B7A6B] block mb-1">📝 Descripción</span>
                      <p className="text-sm whitespace-pre-wrap">{pet.descripcion}</p>
                    </div>
                  )}
                  <div className="bg-[#FEF3E7] p-3 rounded-xl">
                    <span className="text-[#8B7A6B] block mb-1">📞 Contacto</span>
                    <p className="font-medium">{pet.contactoNombre}</p>
                    <p className="text-sm text-[#8B7A6B]">{pet.contactoTelefono}</p>
                  </div>
                </div>

                <a
                  href={getWhatsAppLink(pet.contactoTelefono, whatsappText)}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="flex items-center justify-center gap-2 w-full bg-[#E07A5F] hover:bg-[#C86A50] text-white font-display text-base py-3 rounded-full shadow-md transition"
                >
                  <span>🧡</span> Contactar por WhatsApp
                </a>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const FeedView = ({ type }) => {
      const [pets, setPets] = useState([]);
      const [filters, setFilters] = useState({ especie: 'todos', categoria: 'todas', zona: 'todas' });
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(false);
      const [selectedPet, setSelectedPet] = useState(null);

      const loadData = useCallback(async () => {
        setLoading(true);
        setError(false);
        if (GAS_URL) {
          try {
            const res = await fetch(`${GAS_URL}?action=feed&type=${type}`);
            const json = await res.json();
            if (json.ok) {
              setPets(json.data);
            } else {
              setError(true);
            }
          } catch(e) {
            setError(true);
          }
        } else {
          setError(true);
        }
        setLoading(false);
      }, [type]);

      useEffect(() => { loadData(); }, [loadData]);

      const filtered = useMemo(() => {
        let f = [...pets];
        if (filters.especie !== 'todos') f = f.filter(p => p.especie === filters.especie);
        if (filters.categoria !== 'todas') f = f.filter(p => p.categoria === filters.categoria);
        if (filters.zona !== 'todas') f = f.filter(p => p.zona === filters.zona);
        f.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
        return f;
      }, [pets, filters]);

      if (loading) return <div className="text-center py-12 text-[#8B7A6B]">🐾 Cargando reportes...</div>;
      if (error) return <div className="text-center py-12 text-[#8B7A6B]">⚠️ No pudimos cargar los datos.</div>;

      return (
        <>
          <div className="max-w-7xl mx-auto px-3 pt-2 pb-24">
            <FilterBar filters={filters} setFilters={setFilters} />
            {filtered.length === 0 ? (
              <div className="text-center py-10 bg-white rounded-2xl shadow-soft p-6">
                <span className="text-4xl mb-3 block">🐾</span>
                <p className="text-[#8B7A6B]">Aún no hay reportes.</p>
              </div>
            ) : (
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {filtered.map(pet => (
                  <PetCard key={pet.id} pet={pet} onOpenDetail={setSelectedPet} />
                ))}
              </div>
            )}
          </div>
          {selectedPet && <DetailView pet={selectedPet} onClose={() => setSelectedPet(null)} />}
        </>
      );
    };

    const ReportForm = ({ onMatchFound, onClose }) => {
      const [form, setForm] = useState({
        categoria: 'perdido',
        type: 'perdido',
        nombre: '', especie: 'perro', raza: '', color: '', tamaño: 'mediano',
        zona: 'Medellín Centro', descripcion: '', foto: '',
        contactoNombre: '', contactoTelefonoLocal: '',
        fecha: new Date().toISOString().split('T')[0]
      });
      const [preview, setPreview] = useState(null);
      const [sending, setSending] = useState(false);
      const [processing, setProcessing] = useState(false);
      const [error, setError] = useState('');
      const [success, setSuccess] = useState(false);

      const handleChange = (field, value) => {
        setForm(prev => ({...prev, [field]: value}));
        if (field === 'categoria') {
          const newType = (value === 'perdido' || value === 'urgencia') ? 'perdido' : 'avistamiento';
          setForm(prev => ({...prev, type: newType}));
        }
      };
      
      const handleImage = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        setProcessing(true);
        try { const b64 = await resizeImage(file); setPreview(b64); handleChange('foto', b64); } catch(e) { alert('Error con imagen'); } finally { setProcessing(false); }
      };
      
      const validate = () => {
        if (!form.zona || !form.contactoNombre || !form.contactoTelefonoLocal) { 
          setError('Zona, nombre y teléfono son obligatorios'); 
          return false; 
        }
        setError(''); 
        return true;
      };
      
      const submit = async (e) => {
        e.preventDefault(); 
        if (!validate()) return;
        setSending(true);
        setError('');
        const telefonoCompleto = '+57' + form.contactoTelefonoLocal.replace(/\D/g, '');
        const payload = { 
          action: 'reportar', 
          type: form.type, 
          data: { 
            ...form, 
            contactoTelefono: telefonoCompleto,
            contactoTelefonoLocal: undefined
          } 
        };
        try {
          const res = await fetch(GAS_URL, { method: 'POST', headers: {'Content-Type':'text/plain'}, body: JSON.stringify(payload) });
          const json = await res.json();
          if (json.ok) {
            setSuccess(true);
            onMatchFound({ reporte: payload.data, matches: json.matches || [] });
            setTimeout(() => {
              setForm({
                categoria: 'perdido', type: 'perdido', nombre: '', especie: 'perro', raza: '', color: '', tamaño: 'mediano',
                zona: 'Medellín Centro', descripcion: '', foto: '', contactoNombre: '', contactoTelefonoLocal: '',
                fecha: new Date().toISOString().split('T')[0]
              });
              setPreview(null);
              setSuccess(false);
              onClose();
            }, 2000);
          } else {
            setError(json.error || 'Error en el servidor');
          }
        } catch (err) {
          setError('Error de conexión');
        } finally {
          setSending(false);
        }
      };

      if (success) {
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center bg-white/95 p-4">
            <div className="text-center">
              <span className="text-7xl mb-4 block">✅</span>
              <h3 className="text-2xl font-display text-[#4A3B32] mb-2">¡Reporte enviado!</h3>
              <p className="text-[#8B7A6B]">Gracias por ayudar.</p>
            </div>
          </div>
        );
      }

      return (
        <div className="fixed inset-0 z-50 bg-[#FFF9F2] overflow-auto">
          <div className="sticky top-0 bg-white/90 backdrop-blur-md px-4 py-3 border-b border-[#E07A5F]/20 flex items-center justify-between shadow-soft">
            <h2 className="text-xl font-display text-[#4A3B32]">📋 Reportar mascota</h2>
            <button onClick={onClose} className="w-8 h-8 rounded-full bg-[#FEF3E7] flex items-center justify-center text-[#8B7A6B]">&times;</button>
          </div>
          <div className="max-w-lg mx-auto px-4 py-6">
            <form onSubmit={submit} className="bg-white p-5 rounded-2xl shadow-soft border border-[#E07A5F]/10 space-y-4">
              <div>
                <label className="block mb-1 text-xs font-medium text-[#8B7A6B]">Tipo de reporte *</label>
                <select value={form.categoria} onChange={e=>handleChange('categoria',e.target.value)} className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-4 py-2 text-sm" required>
                  <option value="perdido">🔴 Perdí mi mascota</option>
                  <option value="avistamiento">🟡 Vi una mascota perdida</option>
                  <option value="urgencia">🚨 Urgencia (herido, parto, abandono)</option>
                  <option value="adopcion">🏠 Busca hogar / Adopción</option>
                </select>
              </div>
              <div className="space-y-3">
                <input placeholder="Nombre de la mascota (opcional)" value={form.nombre} onChange={e=>handleChange('nombre',e.target.value)} className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-4 py-2 text-sm" />
                <div className="grid grid-cols-2 gap-2">
                  <select value={form.especie} onChange={e=>handleChange('especie',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-3 py-2 text-sm">
                    <option value="perro">🐕 Perro</option>
                    <option value="gato">🐈 Gato</option>
                    <option value="otro">🐾 Otro</option>
                  </select>
                  <input placeholder="Raza (opcional)" value={form.raza} onChange={e=>handleChange('raza',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-3 py-2 text-sm" />
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <input placeholder="Color(es) *" value={form.color} onChange={e=>handleChange('color',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-3 py-2 text-sm" required />
                  <select value={form.tamaño} onChange={e=>handleChange('tamaño',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-3 py-2 text-sm">
                    <option value="pequeño">Pequeño</option>
                    <option value="mediano">Mediano</option>
                    <option value="grande">Grande</option>
                  </select>
                </div>
                <select value={form.zona} onChange={e=>handleChange('zona',e.target.value)} className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-4 py-2 text-sm" required>
                  {ZONAS.map(z=><option key={z} value={z}>{z}</option>)}
                </select>
                <textarea placeholder="Descripción detallada" value={form.descripcion} onChange={e=>handleChange('descripcion',e.target.value)} className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-2xl px-4 py-2 text-sm" rows="3"></textarea>
                <div><label className="block mb-1 text-xs font-medium text-[#8B7A6B]">📸 Foto</label><input type="file" accept="image/*" onChange={handleImage} disabled={processing} className="block w-full text-xs file:mr-3 file:py-1.5 file:px-3 file:rounded-full file:border-0 file:bg-[#E07A5F] file:text-white" />{preview && <img src={preview} className="mt-2 w-24 h-24 object-cover rounded-xl border border-[#E07A5F]/20" />}</div>
                <div className="grid grid-cols-2 gap-2">
                  <input placeholder="Tu nombre *" value={form.contactoNombre} onChange={e=>handleChange('contactoNombre',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-3 py-2 text-sm" required />
                  <div className="relative">
                    <input 
                      placeholder="Número local *" 
                      value={form.contactoTelefonoLocal} 
                      onChange={e=>handleChange('contactoTelefonoLocal', e.target.value)} 
                      className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full pl-12 pr-3 py-2 text-sm" 
                      required 
                    />
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-[#8B7A6B] font-medium text-sm">+57</span>
                  </div>
                </div>
                <input type="date" value={form.fecha} onChange={e=>handleChange('fecha',e.target.value)} className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-4 py-2 text-sm" />
                {error && <p className="text-[#D9534F] text-xs">{error}</p>}
              </div>
              <button type="submit" disabled={sending||processing} className="w-full bg-[#E07A5F] hover:bg-[#C86A50] text-white font-display text-base py-3 rounded-full shadow-md transition">
                {sending ? 'Enviando...' : '✨ Publicar reporte'}
              </button>
            </form>
          </div>
        </div>
      );
    };

    const MatchView = ({ reporte, matches, onClose }) => (
      <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-3 z-50" onClick={onClose}>
        <div className="bg-white rounded-2xl w-full max-w-md max-h-[80vh] overflow-auto p-4 shadow-soft border border-[#E07A5F]/20" onClick={e => e.stopPropagation()}>
          <div className="flex justify-between items-center mb-3"><h3 className="text-xl font-display text-[#4A3B32]">🎉 ¡Posibles matches!</h3><button onClick={onClose} className="text-2xl text-[#8B7A6B]">&times;</button></div>
          {matches.length===0 ? <p className="text-[#8B7A6B] text-sm">Aún no hay coincidencias.</p> : matches.map((m,i)=>(
            <div key={i} className="bg-[#FFF9F2] p-3 rounded-xl border border-[#E07A5F]/10 mb-3">
              <div className="flex justify-between mb-1"><span className="font-display">{m.pet.nombre||'Mascota'}</span><span className="bg-[#E07A5F]/10 text-[#E07A5F] px-2 py-0.5 rounded-full text-xs">{m.score}%</span></div>
              <p className="text-xs text-[#8B7A6B]">🐾 {m.pet.raza} · 📍 {m.pet.zona}</p>
              <a href={getWhatsAppLink(m.pet.contactoTelefono, `🐾 ¡Posible match! Vi a ${m.pet.nombre||'tu mascota'} en ${m.pet.zona}.`)} target="_blank" className="mt-2 inline-flex items-center gap-1 bg-[#2D5A27] text-white px-3 py-1.5 rounded-full text-xs">🧡 Contactar</a>
            </div>
          ))}
          <button onClick={onClose} className="mt-2 w-full border border-[#E07A5F]/30 py-2 rounded-full text-sm text-[#8B7A6B]">Cerrar</button>
        </div>
      </div>
    );

    const App = () => {
      const [activeTab, setActiveTab] = useState('perdidos');
      const [stats, setStats] = useState({ totalPerdidos: 0, totalAvistamientos: 0, resueltos: 0 });
      const [matchModal, setMatchModal] = useState(null);

      useEffect(() => {
        (async () => {
          if (GAS_URL) {
            try { const r = await fetch(`${GAS_URL}?action=stats`); const j = await r.json(); if (j.ok) setStats(j.data); } catch(e) {}
          }
        })();
      }, []);

      const handleCloseReport = () => setActiveTab('perdidos');

      return (
        <div className="min-h-screen pb-16">
          <Header stats={stats} />
          
          <main className="flex-1">
            {activeTab === 'perdidos' && <FeedView type="perdidos" />}
            {activeTab === 'avistamientos' && <FeedView type="avistamientos" />}
            {activeTab === 'reportar' && <ReportForm onMatchFound={setMatchModal} onClose={handleCloseReport} />}
          </main>

          <BottomNavigation activeTab={activeTab} setActiveTab={setActiveTab} />
          <FloatingActionButton setActiveTab={setActiveTab} />
          
          {matchModal && <MatchView {...matchModal} onClose={() => setMatchModal(null)} />}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
