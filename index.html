<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#FFF9F2">
  <title>Tras Sus Huellas · Valle de Aburrá</title>
  <meta name="description" content="Ayudándolos a volver a casa. Plataforma de búsqueda y reporte de mascotas perdidas en Medellín y área metropolitana.">
  <!-- Fuentes redondeadas y amigables -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ============================================
       TRAS SUS HUELLAS — Rakon Technology
       Estética Terracota & Arena · Pet‑Friendly
       ============================================ */
    :root {
      --tsh-bg: #FFF9F2;
      --tsh-surface: #FFFFFF;
      --tsh-surface-2: #FEF3E7;
      --tsh-accent: #E07A5F;      /* Terracota cálido */
      --tsh-accent-soft: #E78F73;
      --tsh-success: #2D5A27;     /* Verde bosque */
      --tsh-warning: #E6A017;
      --tsh-danger: #D9534F;
      --tsh-text: #4A3B32;
      --tsh-text-muted: #8B7A6B;
      --tsh-border: rgba(224, 122, 95, 0.15);
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.04), 0 2px 4px rgba(0,0,0,0.02);
      --shadow-md: 0 8px 20px rgba(0,0,0,0.06), 0 4px 8px rgba(0,0,0,0.03);
      --shadow-lg: 0 16px 30px rgba(0,0,0,0.05), 0 8px 12px rgba(0,0,0,0.02);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--tsh-bg);
      background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 10 Q45 0 55 15 Q60 30 45 40 Q30 45 20 30 Q15 15 30 10 Z' fill='rgba(224,122,95,0.04)'/%3E%3Ccircle cx='20' cy='35' r='3' fill='rgba(224,122,95,0.06)'/%3E%3Ccircle cx='60' cy='45' r='3' fill='rgba(224,122,95,0.06)'/%3E%3C/svg%3E");
      color: var(--tsh-text);
      font-family: 'Quicksand', sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, .font-display {
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--tsh-surface-2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--tsh-accent); border-radius: 10px; }
    /* Utilidades */
    .bg-tsh-bg { background-color: var(--tsh-bg); }
    .bg-tsh-surface { background-color: var(--tsh-surface); }
    .bg-tsh-surface-2 { background-color: var(--tsh-surface-2); }
    .text-tsh-text { color: var(--tsh-text); }
    .text-tsh-muted { color: var(--tsh-text-muted); }
    .border-tsh-border { border-color: var(--tsh-border); }
    .accent-tsh { color: var(--tsh-accent); }
    .bg-accent-tsh { background-color: var(--tsh-accent); }
    .bg-accent-soft { background-color: var(--tsh-accent-soft); }
    .bg-success { background-color: var(--tsh-success); }
    .bg-warning { background-color: var(--tsh-warning); }
    .bg-danger { background-color: var(--tsh-danger); }
    .border-accent { border-color: var(--tsh-accent); }
    .hover\:bg-accent-soft:hover { background-color: var(--tsh-accent-soft); }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
      100% { transform: translateY(0px); }
    }
    .hover-float:hover {
      animation: float 0.5s ease-in-out;
    }
    .shadow-soft { box-shadow: var(--shadow-sm); }
    .shadow-soft-lg { box-shadow: var(--shadow-md); }
  </style>
</head>
<body class="bg-tsh-bg text-tsh-text antialiased">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    // ⚠️ REEMPLAZAR CON LA URL DE TU WEB APP DE GAS (backend de mascotas)
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwIjj7RQWHhYUTxPYzDoVaghh8LLngV5EFWVX_WZyIyRS44LBNm3z33niQhPbQPjYPE/exec';

    // Mocks cálidos (solo para desarrollo)
    const MOCK_PETS = [
      { id: 'P-0001', type: 'perdido', nombre: 'Luna', especie: 'perro', raza: 'Labrador', color: 'Dorado', tamaño: 'grande', zona: 'El Poblado', descripcion: 'Muy amigable, lleva collar azul', foto: '', contactoNombre: 'Carolina Mesa', contactoTelefono: '573001234567', fecha: '2026-04-15', estado: 'PERDIDO' },
      { id: 'P-0002', type: 'perdido', nombre: 'Tom', especie: 'gato', raza: 'Criollo', color: 'Negro', tamaño: 'mediano', zona: 'Laureles-Estadio', descripcion: 'Ojos verdes, mancha blanca en pecho', foto: '', contactoNombre: 'Andrés Gómez', contactoTelefono: '573108765432', fecha: '2026-04-10', estado: 'PERDIDO' },
      { id: 'A-0001', type: 'avistamiento', nombre: 'Peludito', especie: 'perro', raza: 'Poodle', color: 'Blanco', tamaño: 'pequeño', zona: 'Envigado', descripcion: 'Visto cerca al parque principal', foto: '', contactoNombre: 'Juliana Ruiz', contactoTelefono: '573112223344', fecha: '2026-04-18', estado: 'AVISTADO' },
      { id: 'A-0002', type: 'avistamiento', nombre: 'Michi', especie: 'gato', raza: 'Siames', color: 'Gris', tamaño: 'mediano', zona: 'Sabaneta', descripcion: 'Muy asustado', foto: '', contactoNombre: 'Mateo López', contactoTelefono: '573154443322', fecha: '2026-04-17', estado: 'AVISTADO' },
      { id: 'P-0003', type: 'perdido', nombre: 'Rocky', especie: 'perro', raza: 'Bulldog Francés', color: 'Manchado', tamaño: 'pequeño', zona: 'Belén', descripcion: 'Parche negro en ojo derecho', foto: '', contactoNombre: 'Laura Sánchez', contactoTelefono: '573167894561', fecha: '2026-04-14', estado: 'PERDIDO' },
      { id: 'A-0003', type: 'avistamiento', nombre: 'Cafecito', especie: 'perro', raza: 'Criollo', color: 'Café', tamaño: 'mediano', zona: 'Bello', descripcion: 'Cojea un poco', foto: '', contactoNombre: 'David Ochoa', contactoTelefono: '573123456789', fecha: '2026-04-19', estado: 'AVISTADO' }
    ];

    const ZONAS = ['Medellín Centro','El Poblado','Laureles-Estadio','Belén','Robledo','Envigado','Itagüí','Sabaneta','Bello','Copacabana','La Estrella','Caldas','Barbosa','Girardota'];

    const formatDate = (dateStr) => {
      const diff = new Date() - new Date(dateStr);
      const hours = Math.floor(diff / 36e5);
      return hours < 24 ? `Hace ${hours} horas` : `Hace ${Math.floor(hours/24)} días`;
    };

    const getWhatsAppLink = (phone, text) => `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;

    const resizeImage = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const MAX_WIDTH = 800;
          let width = img.width, height = img.height;
          if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.8));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    // ---------- COMPONENTES ----------
    const Header = () => (
      <header className="sticky top-0 z-20 bg-white/70 backdrop-blur-md border-b border-[#E07A5F]/20 px-4 py-3 shadow-soft">
        <div className="max-w-7xl mx-auto flex items-center justify-between">
          <div className="flex items-center gap-2">
            <span className="text-3xl">🐾</span>
            <h1 className="text-2xl font-display tracking-tight text-[#4A3B32]">Tras Sus <span className="text-[#E07A5F]">Huellas</span></h1>
          </div>
          <span className="bg-[#FEF3E7] px-4 py-2 rounded-full text-sm font-medium text-[#8B7A6B] border border-[#E07A5F]/30">
            📍 Valle de Aburrá
          </span>
        </div>
      </header>
    );

    const HeroSection = ({ stats }) => {
      const [bienvenida, setBienvenida] = useState(null);
      useEffect(() => {
        if (GAS_URL) {
          fetch(`${GAS_URL}?action=bienvenida`).then(r=>r.json()).then(d=>{ if(d.ok) setBienvenida(d.data); }).catch(()=>{});
        }
      }, []);
      return (
        <section className="px-4 py-12 max-w-7xl mx-auto">
          <div className="text-center md:text-left md:flex md:justify-between md:items-center">
            <div>
              <h2 className="text-4xl md:text-5xl font-display leading-tight mb-4 text-[#4A3B32]">
                Ayudándolos a <br/><span className="text-[#E07A5F]">volver a casa</span>
              </h2>
              <p className="text-[#8B7A6B] text-lg max-w-xl">
                {bienvenida ? bienvenida.mensaje : 'Cada reporte nos acerca un poco más a un reencuentro feliz. Juntos lo lograremos.'}
              </p>
            </div>
            <div className="mt-6 md:mt-0 flex justify-center gap-8">
              <div className="text-center"><div className="text-3xl font-display text-[#E07A5F]">{stats.totalPerdidos}</div><div className="text-sm text-[#8B7A6B]">Perdidos</div></div>
              <div className="text-center"><div className="text-3xl font-display text-[#E6A017]">{stats.totalAvistamientos}</div><div className="text-sm text-[#8B7A6B]">Avistamientos</div></div>
              <div className="text-center"><div className="text-3xl font-display text-[#2D5A27]">{stats.resueltos}</div><div className="text-sm text-[#8B7A6B]">Reencuentros</div></div>
            </div>
          </div>
        </section>
      );
    };

    const TabNavigator = ({ activeTab, setActiveTab }) => {
      const tabs = [
        { id: 'perdidos', label: 'Perdidos', icon: '🐕' },
        { id: 'avistamientos', label: 'Avistados', icon: '🐈' },
        { id: 'reportar', label: 'Reportar', icon: '📋' }
      ];
      return (
        <div className="border-b border-[#E07A5F]/20">
          <div className="max-w-7xl mx-auto px-4 flex gap-1">
            {tabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-6 py-3 text-base font-medium transition-all flex items-center gap-2 border-b-2 ${activeTab === tab.id ? 'border-[#E07A5F] text-[#E07A5F]' : 'border-transparent text-[#8B7A6B] hover:text-[#4A3B32]'}`}>
                <span className="text-xl">{tab.icon}</span> {tab.label}
              </button>
            ))}
          </div>
        </div>
      );
    };

    const FilterBar = ({ filters, setFilters }) => (
      <div className="bg-white p-5 rounded-3xl shadow-soft mb-6 flex flex-wrap gap-4 items-end border border-[#E07A5F]/10">
        <div className="flex-1 min-w-[140px]">
          <label className="block text-sm font-medium text-[#8B7A6B] mb-1">Especie</label>
          <select className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-2xl px-4 py-2.5 text-[#4A3B32]" value={filters.especie} onChange={(e) => setFilters({...filters, especie: e.target.value})}>
            <option value="todos">Todos</option><option value="perro">🐕 Perros</option><option value="gato">🐈 Gatos</option>
          </select>
        </div>
        <div className="flex-1 min-w-[180px]">
          <label className="block text-sm font-medium text-[#8B7A6B] mb-1">Zona</label>
          <select className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-2xl px-4 py-2.5 text-[#4A3B32]" value={filters.zona} onChange={(e) => setFilters({...filters, zona: e.target.value})}>
            <option value="todas">Todas las zonas</option>
            {ZONAS.map(z => <option key={z} value={z}>{z}</option>)}
          </select>
        </div>
        <div className="flex-1 min-w-[140px]">
          <label className="block text-sm font-medium text-[#8B7A6B] mb-1">Ordenar</label>
          <select className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-2xl px-4 py-2.5 text-[#4A3B32]" value={filters.sort} onChange={(e) => setFilters({...filters, sort: e.target.value})}>
            <option value="recientes">Más recientes</option><option value="antiguos">Más antiguos</option>
          </select>
        </div>
      </div>
    );

    const PetCard = ({ pet }) => {
      const text = `Hola, vi el reporte de ${pet.nombre || 'esta mascota'} en Tras Sus Huellas. ¿Podemos ayudarte?`;
      return (
        <div className="bg-white rounded-3xl overflow-hidden border border-[#E07A5F]/10 shadow-soft hover:shadow-soft-lg transition-all duration-300 hover-float group">
          <div className="aspect-square bg-[#FEF3E7] flex items-center justify-center text-6xl">
            {pet.foto ? <img src={pet.foto} alt={pet.nombre} className="w-full h-full object-cover" /> : (pet.especie==='perro'?'🐕':'🐈')}
          </div>
          <div className="p-5">
            <div className="flex justify-between items-start mb-2">
              <h3 className="font-display text-xl text-[#4A3B32]">{pet.nombre || 'Sin nombre'}</h3>
              <span className={`px-3 py-1 rounded-full text-xs font-medium ${pet.estado==='PERDIDO'?'bg-[#D9534F]/10 text-[#D9534F] border border-[#D9534F]/30':'bg-[#E6A017]/10 text-[#E6A017] border border-[#E6A017]/30'}`}>
                {pet.estado}
              </span>
            </div>
            <div className="flex flex-wrap gap-2 text-sm text-[#8B7A6B] mb-2">
              <span className="bg-[#FEF3E7] px-3 py-1 rounded-full">{pet.raza}</span>
              <span className="bg-[#FEF3E7] px-3 py-1 rounded-full">{pet.color}</span>
            </div>
            <p className="text-[#8B7A6B] mb-1 flex items-center gap-1"><span>📍</span> {pet.zona}</p>
            <p className="text-xs text-[#8B7A6B] mb-4">{formatDate(pet.fecha)}</p>
            <a href={getWhatsAppLink(pet.contactoTelefono, text)} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-2 w-full bg-[#E07A5F] hover:bg-[#C86A50] text-white font-medium py-3 rounded-full transition-colors text-base shadow-sm">
              <span>🧡</span> Contactar <span>🐾</span>
            </a>
          </div>
        </div>
      );
    };

    const FeedView = ({ type }) => {
      const [pets, setPets] = useState([]);
      const [filters, setFilters] = useState({ especie: 'todos', zona: 'todas', sort: 'recientes' });
      const [loading, setLoading] = useState(true);

      const loadData = useCallback(async () => {
        setLoading(true);
        if (GAS_URL) {
          try {
            const res = await fetch(`${GAS_URL}?action=feed&type=${type}`);
            const json = await res.json();
            if (json.ok) { setPets(json.data); setLoading(false); return; }
          } catch(e) {}
        }
        setPets(MOCK_PETS.filter(p => type === 'perdidos' ? p.type === 'perdido' : p.type === 'avistamiento'));
        setLoading(false);
      }, [type]);

      useEffect(() => { loadData(); }, [loadData]);

      const filtered = useMemo(() => {
        let f = [...pets];
        if (filters.especie !== 'todos') f = f.filter(p => p.especie === filters.especie);
        if (filters.zona !== 'todas') f = f.filter(p => p.zona === filters.zona);
        f.sort((a,b) => filters.sort === 'recientes' ? new Date(b.fecha) - new Date(a.fecha) : new Date(a.fecha) - new Date(b.fecha));
        return f;
      }, [pets, filters]);

      return (
        <div className="max-w-7xl mx-auto px-4 py-8">
          <FilterBar filters={filters} setFilters={setFilters} />
          {loading ? <div className="text-center py-16 text-[#8B7A6B] text-lg">🐾 Buscando mascotas...</div> : (
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
              {filtered.map(pet => <PetCard key={pet.id} pet={pet} />)}
            </div>
          )}
          {!loading && filtered.length === 0 && <div className="text-center py-16 text-[#8B7A6B]">No hay reportes con esos filtros.</div>}
        </div>
      );
    };

    const ReportForm = ({ onMatchFound }) => {
      const [form, setForm] = useState({ type:'perdido', nombre:'', especie:'perro', raza:'', color:'Dorado', tamaño:'mediano', zona:'Medellín Centro', descripcion:'', foto:'', contactoNombre:'', contactoTelefono:'', fecha: new Date().toISOString().split('T')[0] });
      const [preview, setPreview] = useState(null);
      const [sending, setSending] = useState(false);
      const [processing, setProcessing] = useState(false);

      const handleChange = (field, value) => setForm(prev => ({...prev, [field]: value}));
      const handleImage = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        setProcessing(true);
        try { const b64 = await resizeImage(file); setPreview(b64); handleChange('foto', b64); } catch(e) { alert('Error con imagen'); } finally { setProcessing(false); }
      };
      const submit = async (e) => {
        e.preventDefault();
        setSending(true);
        const payload = { action: 'reportar', type: form.type, data: { ...form } };
        if (GAS_URL) {
          try {
            const res = await fetch(GAS_URL, { method: 'POST', headers: {'Content-Type':'text/plain'}, body: JSON.stringify(payload) });
            const json = await res.json();
            if (json.ok) onMatchFound({ reporte: payload.data, matches: json.matches || [] });
          } catch(e) {
            onMatchFound({ reporte: payload.data, matches: [{ id: 'mock', score: 85, pet: MOCK_PETS[0] }] });
          }
        }
        setSending(false);
      };
      return (
        <div className="max-w-3xl mx-auto px-4 py-8">
          <h2 className="text-3xl font-display mb-6 text-[#4A3B32] flex items-center gap-2"><span>📋</span> Reportar mascota</h2>
          <form onSubmit={submit} className="bg-white p-6 md:p-8 rounded-3xl shadow-soft-lg border border-[#E07A5F]/10 space-y-6">
            <div className="flex gap-4">
              <button type="button" onClick={()=>handleChange('type','perdido')} className={`flex-1 py-3 rounded-full border-2 font-medium transition ${form.type==='perdido'?'border-[#E07A5F] bg-[#E07A5F]/10 text-[#E07A5F]':'border-[#E07A5F]/20 text-[#8B7A6B]'}`}>🐕 Perdí mi mascota</button>
              <button type="button" onClick={()=>handleChange('type','avistamiento')} className={`flex-1 py-3 rounded-full border-2 font-medium transition ${form.type==='avistamiento'?'border-[#E07A5F] bg-[#E07A5F]/10 text-[#E07A5F]':'border-[#E07A5F]/20 text-[#8B7A6B]'}`}>🐈 Vi una mascota</button>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <input placeholder="Nombre (opcional)" value={form.nombre} onChange={e=>handleChange('nombre',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-5 py-3" />
              <select value={form.especie} onChange={e=>handleChange('especie',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-5 py-3"><option>perro</option><option>gato</option></select>
              <input placeholder="Raza" value={form.raza} onChange={e=>handleChange('raza',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-5 py-3" />
              <select value={form.color} onChange={e=>handleChange('color',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-5 py-3"><option>Dorado</option><option>Negro</option><option>Blanco</option><option>Café</option><option>Gris</option><option>Manchado</option></select>
              <select value={form.tamaño} onChange={e=>handleChange('tamaño',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-5 py-3"><option>pequeño</option><option>mediano</option><option>grande</option></select>
              <select value={form.zona} onChange={e=>handleChange('zona',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-5 py-3">{ZONAS.map(z=><option key={z}>{z}</option>)}</select>
              <textarea placeholder="Descripción" value={form.descripcion} onChange={e=>handleChange('descripcion',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-3xl px-5 py-3 md:col-span-2" rows="3"></textarea>
            </div>
            <div><label className="block mb-2 font-medium text-[#8B7A6B]">📸 Foto</label><input type="file" accept="image/*" onChange={handleImage} disabled={processing} className="block w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-[#E07A5F] file:text-white" />{preview && <img src={preview} className="mt-4 w-32 h-32 object-cover rounded-3xl border-2 border-[#E07A5F]/20" />}</div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <input placeholder="Tu nombre *" value={form.contactoNombre} onChange={e=>handleChange('contactoNombre',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-5 py-3" required />
              <input placeholder="Teléfono (+57) *" value={form.contactoTelefono} onChange={e=>handleChange('contactoTelefono',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-5 py-3" required />
            </div>
            <input type="date" value={form.fecha} onChange={e=>handleChange('fecha',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-5 py-3" />
            <button type="submit" disabled={sending||processing} className="w-full bg-[#E07A5F] hover:bg-[#C86A50] text-white font-display text-lg py-4 rounded-full shadow-md transition flex items-center justify-center gap-2">✨ Publicar reporte</button>
          </form>
        </div>
      );
    };

    const MatchView = ({ reporte, matches, onClose }) => (
      <div className="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div className="bg-white rounded-3xl max-w-2xl w-full max-h-[80vh] overflow-auto p-6 shadow-soft-lg border border-[#E07A5F]/20">
          <div className="flex justify-between items-center mb-4"><h3 className="text-2xl font-display text-[#4A3B32]">🎉 ¡Posibles coincidencias!</h3><button onClick={onClose} className="text-2xl text-[#8B7A6B]">&times;</button></div>
          {matches.length===0 ? <p className="text-[#8B7A6B]">Aún no hay coincidencias, pero te avisaremos.</p> : matches.map((m,i)=>(
            <div key={i} className="bg-[#FFF9F2] p-5 rounded-3xl border border-[#E07A5F]/10 mb-4">
              <div className="flex justify-between mb-2"><span className="font-display text-lg">{m.pet.nombre||'Mascota'}</span><span className="bg-[#E07A5F]/10 text-[#E07A5F] px-3 py-1 rounded-full text-sm font-medium">{m.score}%</span></div>
              <p className="text-[#8B7A6B]">🐾 {m.pet.raza} · 📍 {m.pet.zona}</p>
              <a href={getWhatsAppLink(m.pet.contactoTelefono, `🐾 ¡Posible match en Tras Sus Huellas! Vi a ${m.pet.nombre||'tu mascota'} en ${m.pet.zona}. ¿Nos coordinamos?`)} target="_blank" className="mt-4 inline-flex items-center gap-2 bg-[#2D5A27] text-white px-5 py-2.5 rounded-full text-sm font-medium">🧡 Contactar</a>
            </div>
          ))}
          <button onClick={onClose} className="mt-4 w-full border border-[#E07A5F]/30 py-3 rounded-full text-[#8B7A6B]">Cerrar</button>
        </div>
      </div>
    );

    const HowItWorks = () => (
      <section className="py-16 px-4 bg-[#FEF3E7]/50"><div className="max-w-7xl mx-auto text-center"><h2 className="text-3xl font-display mb-12 text-[#4A3B32]">¿Cómo ayudamos?</h2><div className="grid grid-cols-1 md:grid-cols-3 gap-8"><div className="bg-white p-8 rounded-3xl shadow-soft"><div className="text-6xl mb-4">📸</div><h3 className="font-display text-xl mb-2">Reporta</h3><p className="text-[#8B7A6B]">Sube foto y detalles</p></div><div className="bg-white p-8 rounded-3xl shadow-soft"><div className="text-6xl mb-4">🔍</div><h3 className="font-display text-xl mb-2">Match</h3><p className="text-[#8B7A6B]">Buscamos coincidencias</p></div><div className="bg-white p-8 rounded-3xl shadow-soft"><div className="text-6xl mb-4">🧡</div><h3 className="font-display text-xl mb-2">Reencuentro</h3><p className="text-[#8B7A6B]">Conexión por WhatsApp</p></div></div></div></section>
    );

    const Footer = () => (
      <footer className="border-t border-[#E07A5F]/20 py-8 px-4 bg-white"><div className="max-w-7xl mx-auto text-center text-[#8B7A6B] text-sm"><p>🐾 Tras Sus Huellas · Valle de Aburrá</p><p className="mt-2">Hecho con 🧡 por <a href="https://rakontech.vercel.app" className="text-[#E07A5F] hover:underline">Rakon Tech</a>. Porque la tecnología debe servir para lo que más importa.</p><p className="mt-2 text-xs">© 2026 · Medellín, Colombia</p></div></footer>
    );

    const App = () => {
      const [activeTab, setActiveTab] = useState('perdidos');
      const [stats, setStats] = useState({ totalPerdidos: 0, totalAvistamientos: 0, resueltos: 0 });
      const [matchModal, setMatchModal] = useState(null);

      useEffect(() => {
        (async () => {
          if (GAS_URL) {
            try { const r = await fetch(`${GAS_URL}?action=stats`); const j = await r.json(); if (j.ok) setStats(j.data); } catch(e) {}
          }
          setStats({ totalPerdidos: MOCK_PETS.filter(p=>p.type==='perdido').length, totalAvistamientos: MOCK_PETS.filter(p=>p.type==='avistamiento').length, resueltos: 2 });
        })();
      }, []);

      return (
        <div className="min-h-screen flex flex-col">
          <Header />
          <HeroSection stats={stats} />
          <TabNavigator activeTab={activeTab} setActiveTab={setActiveTab} />
          <main className="flex-1">
            {activeTab==='perdidos' && <FeedView type="perdidos" />}
            {activeTab==='avistamientos' && <FeedView type="avistamientos" />}
            {activeTab==='reportar' && <ReportForm onMatchFound={setMatchModal} />}
          </main>
          <HowItWorks />
          <Footer />
          {matchModal && <MatchView {...matchModal} onClose={()=>setMatchModal(null)} />}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
