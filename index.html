<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#FFF9F2">
  <title>Tras Sus Huellas · Valle de Aburrá</title>
  <meta name="description" content="Ayudándolos a volver a casa. Plataforma de búsqueda de mascotas perdidas en Medellín.">
  <link rel="icon" type="image/png" href="https://i.postimg.cc/vBzFDdx1/20-4-2026-1-32-05-a-m.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --tsh-bg: #FFF9F2;
      --tsh-surface: #FFFFFF;
      --tsh-surface-2: #FEF3E7;
      --tsh-accent: #E07A5F;
      --tsh-accent-soft: #E78F73;
      --tsh-success: #2D5A27;
      --tsh-warning: #E6A017;
      --tsh-danger: #D9534F;
      --tsh-urgencia: #B91C1C;
      --tsh-adopcion: #15803D;
      --tsh-text: #4A3B32;
      --tsh-text-muted: #8B7A6B;
      --tsh-border: rgba(224, 122, 95, 0.15);
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.04), 0 2px 4px rgba(0,0,0,0.02);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.06), 0 4px 8px rgba(0,0,0,0.03);
      --shadow-lg: 0 16px 32px rgba(0,0,0,0.05), 0 8px 12px rgba(0,0,0,0.02);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--tsh-bg);
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 8 Q32 0 40 12 Q44 24 32 32 Q20 36 14 24 Q10 12 20 8 Z' fill='rgba(224,122,95,0.02)'/%3E%3C/svg%3E");
      color: var(--tsh-text);
      font-family: 'Quicksand', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, .font-display { font-family: 'Fredoka', sans-serif; font-weight: 600; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--tsh-surface-2); }
    ::-webkit-scrollbar-thumb { background: var(--tsh-accent); border-radius: 8px; }
    .leaflet-container { font-family: 'Quicksand', sans-serif; z-index: 1; }
  </style>
</head>
<body class="bg-tsh-bg text-tsh-text antialiased">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // ⚠️ REEMPLAZAR CON LA URL DE TU WEB APP DE GAS
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwIjj7RQWHhYUTxPYzDoVaghh8LLngV5EFWVX_WZyIyRS44LBNm3z33niQhPbQPjYPE/exec';

    const ZONAS = ['Medellín Centro','El Poblado','Laureles-Estadio','Belén','Robledo','Envigado','Itagüí','Sabaneta','Bello','Copacabana','La Estrella','Caldas','Barbosa','Girardota'];
    const CENTRO_VALLE = [6.2442, -75.5812];

    const formatDate = (dateStr) => {
      const diff = new Date() - new Date(dateStr);
      const hours = Math.floor(diff / 36e5);
      return hours < 24 ? `Hace ${hours} h` : `Hace ${Math.floor(hours/24)} d`;
    };

    const getWhatsAppLink = (phone, text) => `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;

    const resizeImage = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const MAX_WIDTH = 800;
          let width = img.width, height = img.height;
          if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.8));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    // ---------- COMPONENTES ----------
    const Header = ({ stats, onOpenMission }) => (
      <header className="sticky top-0 z-20 bg-white/90 backdrop-blur-md border-b border-[#E07A5F]/20 px-4 py-3 shadow-soft">
        <div className="max-w-7xl mx-auto flex items-center justify-between">
          <div className="flex items-center gap-3">
            <img 
              src="https://i.postimg.cc/vBzFDdx1/20-4-2026-1-32-05-a-m.png" 
              alt="Tras Sus Huellas" 
              className="w-9 h-9 object-contain"
            />
            <h1 className="text-xl font-display tracking-tight text-[#4A3B32]">
              Tras Sus <span className="text-[#E07A5F]">Huellas</span>
            </h1>
          </div>
          <div className="flex items-center gap-4">
            <div className="flex items-center gap-3 text-xs">
              <div className="text-center"><span className="font-display text-[#E07A5F]">{stats.totalPerdidos}</span><span className="ml-1 text-[#8B7A6B]">🔴</span></div>
              <div className="text-center"><span className="font-display text-[#E6A017]">{stats.totalAvistamientos}</span><span className="ml-1 text-[#8B7A6B]">🟡</span></div>
              <div className="text-center"><span className="font-display text-[#2D5A27]">{stats.resueltos}</span><span className="ml-1 text-[#8B7A6B]">✅</span></div>
            </div>
            <button 
              onClick={onOpenMission}
              className="bg-[#FEF3E7] hover:bg-[#FDE8D8] p-2 rounded-full transition-colors"
              title="Nuestra Misión"
            >
              <span className="text-sm">✨</span>
            </button>
            <span className="bg-[#FEF3E7] px-3 py-1 rounded-full text-[10px] font-medium text-[#8B7A6B] border border-[#E07A5F]/30 hidden sm:block">
              Valle de Aburrá
            </span>
          </div>
        </div>
      </header>
    );

    const MissionModal = ({ isOpen, onClose }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/30 backdrop-blur-sm" onClick={onClose}>
          <div className="bg-white rounded-3xl max-w-md w-full p-6 shadow-lg border border-[#E07A5F]/20" onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-xl font-display text-[#4A3B32]">✨ Nuestra Misión</h3>
              <button onClick={onClose} className="text-2xl text-[#8B7A6B]">&times;</button>
            </div>
            <p className="text-[#4A3B32] mb-4 leading-relaxed">
              Tras Sus Huellas es un aporte social de <strong>Rakon Technology</strong>. Somos una iniciativa orgullosamente colombiana dedicada a brindar tecnología accesible a las empresas y comunidades de nuestro país. Este es nuestro grano de arena para conectar a los que más nos necesitan.
            </p>
            <a 
              href="https://rakontech.vercel.app" 
              target="_blank" 
              className="text-[#E07A5F] font-medium hover:underline"
            >
              Conoce más en rakontech.vercel.app →
            </a>
          </div>
        </div>
      );
    };

    const BottomNavigation = ({ activeTab, viewMode, setViewMode, setActiveTab }) => {
      const tabs = [
        { id: 'perdidos', label: 'Perdidos', icon: '🔴' },
        { id: 'avistamientos', label: 'Avistados', icon: '🟡' }
      ];
      return (
        <div className="fixed bottom-0 left-0 right-0 z-30 bg-white/90 backdrop-blur-md border-t border-[#E07A5F]/20 px-4 py-3">
          <div className="max-w-7xl mx-auto flex justify-around items-center">
            <button onClick={() => setViewMode('feed')} className={`flex flex-col items-center py-1 px-4 rounded-full transition ${viewMode === 'feed' ? 'text-[#E07A5F]' : 'text-[#8B7A6B]'}`}>
              <span className="text-xl">📋</span><span className="text-[10px] font-medium">Lista</span>
            </button>
            {tabs.map(tab => (
              <button key={tab.id} onClick={() => { setActiveTab(tab.id); setViewMode('feed'); }} className={`flex flex-col items-center py-1 px-4 rounded-full transition ${activeTab === tab.id && viewMode === 'feed' ? 'text-[#E07A5F]' : 'text-[#8B7A6B]'}`}>
                <span className="text-xl">{tab.icon}</span><span className="text-[10px] font-medium">{tab.label}</span>
              </button>
            ))}
            <button onClick={() => setViewMode('map')} className={`flex flex-col items-center py-1 px-4 rounded-full transition ${viewMode === 'map' ? 'text-[#E07A5F]' : 'text-[#8B7A6B]'}`}>
              <span className="text-xl">🗺️</span><span className="text-[10px] font-medium">Mapa</span>
            </button>
          </div>
        </div>
      );
    };

    const FloatingActionButton = ({ setActiveTab }) => (
      <button
        onClick={() => setActiveTab('reportar')}
        className="fixed bottom-24 right-5 z-40 w-14 h-14 rounded-full bg-[#E07A5F] text-white shadow-lg flex items-center justify-center text-2xl hover:bg-[#C86A50] transition-all active:scale-95"
        style={{ boxShadow: '0 8px 20px rgba(224,122,95,0.4)' }}
      >
        <span>📋</span>
      </button>
    );

    const SupportBanner = () => (
  <div className="max-w-7xl mx-auto px-4 mb-6">
    <div className="bg-white/80 backdrop-blur-sm rounded-2xl p-5 shadow-soft border border-[#E07A5F]/20">
      <p className="text-sm text-[#4A3B32] mb-2">
        ¿Encontraste un error? Reporta fallas o apoya este proyecto con una donación.
      </p>
      <div className="flex flex-col sm:flex-row gap-3 sm:gap-6 text-sm">
        <a 
          href="https://wa.me/573023155441?text=Hola%2C%20quiero%20apoyar%20Tras%20Sus%20Huellas%20o%20reportar%20un%20problema." 
          target="_blank" 
          className="inline-flex items-center gap-2 text-[#E07A5F] font-medium hover:underline"
        >
          <span>📱</span> +57 302 315 5441
        </a>
        <span className="inline-flex items-center gap-2 text-[#8B7A6B]">
          <span>🏦</span> Bancolombia, ahorros: 43041133962
        </span>
      </div>
    </div>
  </div>
);

    const Footer = () => (
      <footer className="py-6 px-4 mt-8 border-t border-[#E07A5F]/10">
        <div className="max-w-7xl mx-auto text-center">
          <p className="text-xs text-[#8B7A6B]">
            <a href="https://rakontech.vercel.app" target="_blank" className="hover:text-[#E07A5F] transition-colors">
              Powered by <span className="font-medium">Rakon Technology</span>
            </a>
            <span className="mx-2">·</span>
            <span>Hecho con 🧡 en Colombia</span>
          </p>
        </div>
      </footer>
    );

    const FilterBar = ({ filters, setFilters }) => (
      <div className="bg-white p-4 rounded-2xl shadow-soft mb-6 flex flex-wrap gap-3 items-end border border-[#E07A5F]/10">
        <div className="flex-1 min-w-[120px]">
          <label className="block text-xs font-medium text-[#8B7A6B] mb-1">Especie</label>
          <select className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-xl px-3 py-2.5 text-sm" value={filters.especie} onChange={(e) => setFilters({...filters, especie: e.target.value})}>
            <option value="todos">Todos</option><option value="perro">🐕 Perros</option><option value="gato">🐈 Gatos</option><option value="otro">🐾 Otro</option>
          </select>
        </div>
        <div className="flex-1 min-w-[130px]">
          <label className="block text-xs font-medium text-[#8B7A6B] mb-1">Categoría</label>
          <select className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-xl px-3 py-2.5 text-sm" value={filters.categoria} onChange={(e) => setFilters({...filters, categoria: e.target.value})}>
            <option value="todas">Todas</option><option value="perdido">🔴 Perdidos</option><option value="avistamiento">🟡 Avistados</option><option value="urgencia">🚨 Urgencias</option><option value="adopcion">🏠 Adopción</option>
          </select>
        </div>
        <div className="flex-1 min-w-[130px]">
          <label className="block text-xs font-medium text-[#8B7A6B] mb-1">Zona</label>
          <select className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-xl px-3 py-2.5 text-sm" value={filters.zona} onChange={(e) => setFilters({...filters, zona: e.target.value})}>
            <option value="todas">Todas</option>{ZONAS.map(z => <option key={z} value={z}>{z}</option>)}
          </select>
        </div>
      </div>
    );

    const PetCard = ({ pet, onOpenDetail }) => {
      const categoriaConfig = {
        perdido: { bg: 'bg-[#D9534F]', text: 'PERDIDO' },
        avistamiento: { bg: 'bg-[#E6A017]', text: 'AVISTADO' },
        urgencia: { bg: 'bg-[#B91C1C]', text: '🚨 URGENTE' },
        adopcion: { bg: 'bg-[#15803D]', text: '🏠 ADOPCIÓN' }
      };
      const cat = categoriaConfig[pet.categoria] || { bg: 'bg-gray-500', text: pet.categoria?.toUpperCase() };
      const whatsappText = `Hola, vi el reporte de ${pet.nombre || 'esta mascota'} (${cat.text}) en Tras Sus Huellas. ¿Podemos ayudar?`;
      
      return (
        <div className="bg-white rounded-3xl overflow-hidden border border-[#E07A5F]/10 shadow-soft hover:shadow-md transition-all duration-200 cursor-pointer" onClick={(e) => { if (!e.target.closest('a')) onOpenDetail(pet); }}>
          <div className="relative aspect-square bg-[#FEF3E7]">
            {pet.foto ? <img src={pet.foto} alt={pet.nombre} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-6xl">{pet.especie==='perro'?'🐕':pet.especie==='gato'?'🐈':'🐾'}</div>}
            <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/60 to-transparent p-4">
              <h3 className="font-display text-white text-xl truncate">{pet.nombre || 'Sin nombre'}</h3>
              <p className="text-white/80 text-xs flex items-center gap-1"><span>📍</span> {pet.zona}</p>
            </div>
            <span className={`absolute top-3 right-3 px-3 py-1 rounded-full text-[10px] font-medium text-white ${cat.bg}`}>{cat.text}</span>
          </div>
          <div className="p-4">
            <div className="flex flex-wrap gap-2 text-xs text-[#8B7A6B] mb-2">
              <span className="bg-[#FEF3E7] px-3 py-1 rounded-full">{pet.raza || 'Raza desconocida'}</span>
              <span className="bg-[#FEF3E7] px-3 py-1 rounded-full">{pet.color || 'Color no especificado'}</span>
              {pet.sexo && <span className="bg-[#FEF3E7] px-3 py-1 rounded-full">{pet.sexo==='macho'?'♂️':'♀️'}</span>}
              {pet.edad && <span className="bg-[#FEF3E7] px-3 py-1 rounded-full">{pet.edad}</span>}
            </div>
            {pet.descripcion && <p className="text-xs text-[#8B7A6B] mb-3 italic">"{pet.descripcion.length > 50 ? pet.descripcion.substring(0,50)+'…' : pet.descripcion}"</p>}
            <p className="text-[10px] text-[#8B7A6B] mb-3">{formatDate(pet.fecha)}</p>
            <a href={getWhatsAppLink(pet.contactoTelefono, whatsappText)} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-2 w-full bg-[#E07A5F] hover:bg-[#C86A50] text-white text-sm font-medium py-3 rounded-full transition-colors shadow-sm">
              <span>🧡</span> Contactar
            </a>
          </div>
        </div>
      );
    };

    const DetailView = ({ pet, onClose }) => {
      const categoriaConfig = {
        perdido: { bg: 'bg-[#D9534F]', text: 'PERDIDO' },
        avistamiento: { bg: 'bg-[#E6A017]', text: 'AVISTADO' },
        urgencia: { bg: 'bg-[#B91C1C]', text: '🚨 URGENTE' },
        adopcion: { bg: 'bg-[#15803D]', text: '🏠 ADOPCIÓN' }
      };
      const cat = categoriaConfig[pet.categoria] || { bg: 'bg-gray-500', text: pet.categoria?.toUpperCase() };
      const whatsappText = `Hola, vi el reporte de ${pet.nombre || 'esta mascota'} (${cat.text}) en Tras Sus Huellas. ¿Podemos ayudar?`;

      return (
        <div className="fixed inset-0 z-50 bg-[#FFF9F2] overflow-auto" onClick={onClose}>
          <div className="min-h-screen flex items-center justify-center p-4" onClick={e => e.stopPropagation()}>
            <div className="bg-white rounded-3xl shadow-lg max-w-lg w-full overflow-hidden border border-[#E07A5F]/20">
              <div className="relative aspect-video bg-[#FEF3E7]">
                {pet.foto ? <img src={pet.foto} alt={pet.nombre} className="w-full h-full object-contain" /> : <div className="w-full h-full flex items-center justify-center text-8xl">{pet.especie==='perro'?'🐕':pet.especie==='gato'?'🐈':'🐾'}</div>}
                <button onClick={onClose} className="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/90 backdrop-blur-sm flex items-center justify-center text-[#4A3B32] shadow-md">&times;</button>
                <span className={`absolute top-4 left-4 px-4 py-1.5 rounded-full text-xs font-medium text-white ${cat.bg}`}>{cat.text}</span>
              </div>
              <div className="p-6">
                <div className="flex justify-between items-start mb-4">
                  <h2 className="text-2xl font-display text-[#4A3B32]">{pet.nombre || 'Sin nombre'}</h2>
                  <span className="text-sm text-[#8B7A6B]">{formatDate(pet.fecha)}</span>
                </div>
                <div className="space-y-4 mb-6">
                  <div className="flex items-center gap-3 flex-wrap">
                    <span className="text-lg">{pet.especie==='perro'?'🐕':pet.especie==='gato'?'🐈':'🐾'}</span>
                    <span className="font-medium">{pet.raza || 'Raza no especificada'}</span>
                    {pet.sexo && <span className="text-sm bg-[#FEF3E7] px-3 py-1.5 rounded-full">{pet.sexo==='macho'?'♂️ Macho':'♀️ Hembra'}</span>}
                    {pet.edad && <span className="text-sm bg-[#FEF3E7] px-3 py-1.5 rounded-full">{pet.edad}</span>}
                  </div>
                  <div className="grid grid-cols-2 gap-3 text-sm">
                    <div className="bg-[#FEF3E7] p-3 rounded-xl"><span className="text-[#8B7A6B]">Color:</span> {pet.color || '—'}</div>
                    <div className="bg-[#FEF3E7] p-3 rounded-xl"><span className="text-[#8B7A6B]">Tamaño:</span> {pet.tamaño || '—'}</div>
                  </div>
                  <div className="bg-[#FEF3E7] p-4 rounded-xl"><span className="text-[#8B7A6B] block mb-1">📍 Zona</span><span className="font-medium">{pet.zona}</span></div>
                  {pet.descripcion && <div className="bg-[#FEF3E7] p-4 rounded-xl"><span className="text-[#8B7A6B] block mb-1">📝 Descripción</span><p className="text-sm whitespace-pre-wrap">{pet.descripcion}</p></div>}
                  <div className="bg-[#FEF3E7] p-4 rounded-xl"><span className="text-[#8B7A6B] block mb-1">📞 Contacto</span><p className="font-medium">{pet.contactoNombre}</p><p className="text-sm text-[#8B7A6B]">{pet.contactoTelefono}</p></div>
                </div>
                <a href={getWhatsAppLink(pet.contactoTelefono, whatsappText)} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-2 w-full bg-[#E07A5F] hover:bg-[#C86A50] text-white font-display text-base py-4 rounded-full shadow-md transition">
                  <span>🧡</span> Contactar por WhatsApp
                </a>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const MapView = ({ pets, onOpenDetail }) => {
      const mapRef = useRef(null);
      const mapInstance = useRef(null);
      const markersLayer = useRef(null);

      useEffect(() => {
        if (!mapRef.current) return;
        if (!mapInstance.current) {
          mapInstance.current = L.map(mapRef.current).setView(CENTRO_VALLE, 12);
          L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap' }).addTo(mapInstance.current);
          markersLayer.current = L.layerGroup().addTo(mapInstance.current);
        }
        markersLayer.current.clearLayers();
        pets.forEach(pet => {
          if (pet.lat && pet.lng) {
            const color = { perdido: '#D9534F', avistamiento: '#E6A017', urgencia: '#B91C1C', adopcion: '#15803D' }[pet.categoria] || '#888';
            const marker = L.circleMarker([pet.lat, pet.lng], { radius: 10, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.8 });
            const popupContent = `
              <div style="min-width:220px; font-family:'Quicksand',sans-serif; padding:4px;">
                <div style="display:flex; gap:12px; margin-bottom:12px;">
                  ${pet.foto ? `<img src="${pet.foto}" style="width:60px;height:60px;object-fit:cover;border-radius:16px;" />` : `<div style="width:60px;height:60px;background:#FEF3E7;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;">${pet.especie==='perro'?'🐕':'🐈'}</div>`}
                  <div><strong style="font-size:18px;">${pet.nombre||'Sin nombre'}</strong><div style="font-size:13px;color:#8B7A6B;">${pet.raza||''}</div><div style="font-size:13px;color:#8B7A6B;">📍 ${pet.zona}</div></div>
                </div>
                <button id="popup-detail-${pet.id}" style="width:100%;background:#E07A5F;border:none;color:white;padding:10px;border-radius:40px;font-weight:600;margin-bottom:6px;">Ver detalles</button>
                <a href="${getWhatsAppLink(pet.contactoTelefono, `Hola, vi a ${pet.nombre||'esta mascota'} en el mapa.`)}" target="_blank" style="display:block;text-align:center;background:#2D5A27;color:white;padding:10px;border-radius:40px;text-decoration:none;font-weight:500;">🧡 Contactar</a>
              </div>`;
            marker.bindPopup(popupContent);
            marker.on('popupopen', () => { const btn = document.getElementById(`popup-detail-${pet.id}`); if (btn) btn.addEventListener('click', () => onOpenDetail(pet)); });
            markersLayer.current.addLayer(marker);
          }
        });
      }, [pets, onOpenDetail]);

      return <div ref={mapRef} style={{ height: 'calc(100vh - 180px)', width: '100%', zIndex: 1, borderRadius: '24px' }} className="border border-[#E07A5F]/20" />;
    };

    const FeedView = ({ type, viewMode, onOpenDetail }) => {
      const [pets, setPets] = useState([]);
      const [filters, setFilters] = useState({ especie: 'todos', categoria: 'todas', zona: 'todas' });
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(false);

      useEffect(() => {
        (async () => {
          setLoading(true);
          if (GAS_URL) {
            try {
              const res = await fetch(`${GAS_URL}?action=feed&type=${type}`);
              const json = await res.json();
              if (json.ok) setPets(json.data); else setError(true);
            } catch(e) { setError(true); }
          }
          setLoading(false);
        })();
      }, [type]);

      const filtered = useMemo(() => {
        let f = [...pets];
        if (filters.especie !== 'todos') f = f.filter(p => p.especie === filters.especie);
        if (filters.categoria !== 'todas') f = f.filter(p => p.categoria === filters.categoria);
        if (filters.zona !== 'todas') f = f.filter(p => p.zona === filters.zona);
        f.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
        return f;
      }, [pets, filters]);

      if (loading) return <div className="text-center py-16 text-[#8B7A6B]">🐾 Cargando reportes...</div>;
      if (error) return <div className="text-center py-16 text-[#8B7A6B]">⚠️ No pudimos cargar los datos.</div>;
      if (viewMode === 'map') return <MapView pets={filtered} onOpenDetail={onOpenDetail} />;

      return (
        <div className="max-w-7xl mx-auto px-4 pt-4 pb-28">
          <FilterBar filters={filters} setFilters={setFilters} />
          <SupportBanner />
          {filtered.length === 0 ? (
            <div className="text-center py-16 bg-white rounded-3xl shadow-soft p-8">
              <span className="text-5xl mb-4 block">🐾</span>
              <p className="text-[#8B7A6B]">Aún no hay reportes.</p>
            </div>
          ) : (
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
              {filtered.map(pet => <PetCard key={pet.id} pet={pet} onOpenDetail={onOpenDetail} />)}
            </div>
          )}
        </div>
      );
    };

    const LocationPicker = ({ onSelect, initialLat, initialLng }) => {
      const mapRef = useRef(null);
      const [selected, setSelected] = useState({ lat: initialLat || CENTRO_VALLE[0], lng: initialLng || CENTRO_VALLE[1] });

      useEffect(() => {
        if (!mapRef.current) return;
        const map = L.map(mapRef.current).setView([selected.lat, selected.lng], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        const marker = L.marker([selected.lat, selected.lng], { draggable: true }).addTo(map);
        marker.on('dragend', (e) => { const pos = e.target.getLatLng(); setSelected(pos); onSelect(pos.lat, pos.lng); });
        map.on('click', (e) => { const { lat, lng } = e.latlng; setSelected({ lat, lng }); marker.setLatLng([lat, lng]); onSelect(lat, lng); });
        const GPSControl = L.Control.extend({
          onAdd: () => {
            const btn = L.DomUtil.create('button', 'bg-white border border-[#E07A5F]/30 rounded-full p-3 shadow-md');
            btn.innerHTML = '📍'; btn.title = 'Usar mi ubicación';
            btn.onclick = (e) => { e.preventDefault(); navigator.geolocation?.getCurrentPosition(p => { map.setView([p.coords.latitude, p.coords.longitude], 16); marker.setLatLng([p.coords.latitude, p.coords.longitude]); setSelected({ lat: p.coords.latitude, lng: p.coords.longitude }); onSelect(p.coords.latitude, p.coords.longitude); }); return false; };
            return btn;
          }
        });
        map.addControl(new GPSControl({ position: 'topright' }));
        return () => map.remove();
      }, []);

      return <div ref={mapRef} style={{ height: '220px', width: '100%', borderRadius: '20px' }} className="border border-[#E07A5F]/20" />;
    };

    const ReportForm = ({ onMatchFound, onClose }) => {
      const [form, setForm] = useState({
        categoria: 'perdido', type: 'perdido',
        nombre: '', especie: 'perro', raza: '', color: '', tamaño: 'mediano',
        sexo: '', edad: '',
        zona: 'Medellín Centro', descripcion: '', foto: '',
        contactoNombre: '', contactoTelefonoLocal: '',
        fecha: new Date().toISOString().split('T')[0],
        lat: CENTRO_VALLE[0], lng: CENTRO_VALLE[1]
      });
      const [preview, setPreview] = useState(null);
      const [sending, setSending] = useState(false);
      const [processing, setProcessing] = useState(false);
      const [error, setError] = useState('');
      const [success, setSuccess] = useState(false);

      const handleChange = (field, value) => {
        setForm(prev => ({...prev, [field]: value}));
        if (field === 'categoria') {
          const newType = (value === 'perdido' || value === 'urgencia') ? 'perdido' : 'avistamiento';
          setForm(prev => ({...prev, type: newType}));
        }
      };
      
      const handleImage = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        setProcessing(true);
        try { const b64 = await resizeImage(file); setPreview(b64); handleChange('foto', b64); } catch(e) { alert('Error con imagen'); } finally { setProcessing(false); }
      };
      
      const submit = async (e) => {
        e.preventDefault();
        if (!form.zona || !form.contactoNombre || !form.contactoTelefonoLocal) { setError('Zona, nombre y teléfono son obligatorios'); return; }
        setSending(true); setError('');
        const telefonoCompleto = '+57' + form.contactoTelefonoLocal.replace(/\D/g, '');
        const payload = { action: 'reportar', type: form.type, data: { ...form, contactoTelefono: telefonoCompleto, contactoTelefonoLocal: undefined } };
        try {
          const res = await fetch(GAS_URL, { method: 'POST', headers: {'Content-Type':'text/plain'}, body: JSON.stringify(payload) });
          const json = await res.json();
          if (json.ok) {
            setSuccess(true);
            onMatchFound({ reporte: payload.data, matches: json.matches || [] });
            setTimeout(() => {
              setForm({ categoria: 'perdido', type: 'perdido', nombre: '', especie: 'perro', raza: '', color: '', tamaño: 'mediano', sexo: '', edad: '', zona: 'Medellín Centro', descripcion: '', foto: '', contactoNombre: '', contactoTelefonoLocal: '', fecha: new Date().toISOString().split('T')[0], lat: CENTRO_VALLE[0], lng: CENTRO_VALLE[1] });
              setPreview(null); setSuccess(false); onClose();
            }, 2000);
          } else setError(json.error || 'Error en el servidor');
        } catch (err) { setError('Error de conexión'); }
        finally { setSending(false); }
      };

      if (success) return <div className="fixed inset-0 z-50 flex items-center justify-center bg-white/95 p-4"><div className="text-center"><span className="text-7xl mb-4 block">✅</span><h3 className="text-2xl font-display text-[#4A3B32] mb-2">¡Reporte enviado!</h3><p className="text-[#8B7A6B]">Gracias por ayudar.</p></div></div>;

      return (
        <div className="fixed inset-0 z-50 bg-[#FFF9F2] overflow-auto">
          <div className="sticky top-0 bg-white/90 backdrop-blur-md px-5 py-4 border-b border-[#E07A5F]/20 flex items-center justify-between shadow-soft">
            <h2 className="text-xl font-display text-[#4A3B32]">📋 Reportar mascota</h2>
            <button onClick={onClose} className="w-10 h-10 rounded-full bg-[#FEF3E7] flex items-center justify-center text-[#8B7A6B]">&times;</button>
          </div>
          <div className="max-w-lg mx-auto px-4 py-6">
            <form onSubmit={submit} className="bg-white p-6 rounded-3xl shadow-soft border border-[#E07A5F]/10 space-y-6">
              <div>
                <label className="block mb-1 text-xs font-medium text-[#8B7A6B]">Tipo de reporte *</label>
                <select value={form.categoria} onChange={e=>handleChange('categoria',e.target.value)} className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-5 py-3 text-sm" required>
                  <option value="perdido">🔴 Perdí mi mascota</option>
                  <option value="avistamiento">🟡 Vi una mascota perdida</option>
                  <option value="urgencia">🚨 Urgencia (herido, parto, abandono)</option>
                  <option value="adopcion">🏠 Busca hogar / Adopción</option>
                </select>
              </div>

              <div className="space-y-4 pt-2 border-t border-[#E07A5F]/10">
                <p className="text-sm font-medium text-[#4A3B32]">🐾 Datos de la mascota</p>
                <input placeholder="Nombre (opcional)" value={form.nombre} onChange={e=>handleChange('nombre',e.target.value)} className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-5 py-3 text-sm" />
                <div className="grid grid-cols-2 gap-3">
                  <select value={form.especie} onChange={e=>handleChange('especie',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-4 py-3 text-sm">
                    <option value="perro">🐕 Perro</option><option value="gato">🐈 Gato</option><option value="otro">🐾 Otro</option>
                  </select>
                  <input placeholder="Raza" value={form.raza} onChange={e=>handleChange('raza',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-4 py-3 text-sm" />
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <input placeholder="Color(es) *" value={form.color} onChange={e=>handleChange('color',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-4 py-3 text-sm" required />
                  <select value={form.tamaño} onChange={e=>handleChange('tamaño',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-4 py-3 text-sm">
                    <option value="pequeño">Pequeño</option><option value="mediano">Mediano</option><option value="grande">Grande</option>
                  </select>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <select value={form.sexo} onChange={e=>handleChange('sexo',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-4 py-3 text-sm">
                    <option value="">Sexo (opcional)</option><option value="macho">♂️ Macho</option><option value="hembra">♀️ Hembra</option>
                  </select>
                  <input placeholder="Edad (ej: 4 años)" value={form.edad} onChange={e=>handleChange('edad',e.target.value)} className="bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-4 py-3 text-sm" />
                </div>
              </div>

              <div className="space-y-4 pt-2 border-t border-[#E07A5F]/10">
                <p className="text-sm font-medium text-[#4A3B32]">📍 Ubicación</p>
                <select value={form.zona} onChange={e=>handleChange('zona',e.target.value)} className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-5 py-3 text-sm" required>
                  {ZONAS.map(z=><option key={z} value={z}>{z}</option>)}
                </select>
                <LocationPicker onSelect={(lat, lng) => { handleChange('lat', lat); handleChange('lng', lng); }} initialLat={form.lat} initialLng={form.lng} />
                <p className="text-[10px] text-[#8B7A6B]">Toca el mapa o usa 📍 para tu ubicación actual.</p>
                <textarea placeholder="Descripción detallada *" value={form.descripcion} onChange={e=>handleChange('descripcion',e.target.value)} className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-2xl px-5 py-3 text-sm" rows="3" required></textarea>
              </div>

              <div className="pt-2 border-t border-[#E07A5F]/10">
                <label className="block mb-1 text-xs font-medium text-[#8B7A6B]">📸 Foto</label>
                <input type="file" accept="image/*" onChange={handleImage} disabled={processing} className="block w-full text-xs file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-[#E07A5F] file:text-white" />
                {preview && <img src={preview} className="mt-3 w-28 h-28 object-cover rounded-xl border border-[#E07A5F]/20" />}
              </div>

              <div className="space-y-4 pt-2 border-t border-[#E07A5F]/10">
                <p className="text-sm font-medium text-[#4A3B32]">📞 Contacto</p>
                <input placeholder="Tu nombre *" value={form.contactoNombre} onChange={e=>handleChange('contactoNombre',e.target.value)} className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-5 py-3 text-sm" required />
                <div className="relative">
                  <input placeholder="Número local *" value={form.contactoTelefonoLocal} onChange={e=>handleChange('contactoTelefonoLocal', e.target.value)} className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full pl-14 pr-4 py-3 text-sm" required />
                  <span className="absolute left-4 top-1/2 -translate-y-1/2 text-[#8B7A6B] font-medium text-sm">+57</span>
                </div>
                <input type="date" value={form.fecha} onChange={e=>handleChange('fecha',e.target.value)} className="w-full bg-[#FFF9F2] border border-[#E07A5F]/20 rounded-full px-5 py-3 text-sm" />
                {error && <p className="text-[#D9534F] text-xs">{error}</p>}
              </div>

              <button type="submit" disabled={sending||processing} className="w-full bg-[#E07A5F] hover:bg-[#C86A50] text-white font-display text-base py-4 rounded-full shadow-md transition">
                {sending ? 'Enviando...' : '✨ Publicar reporte'}
              </button>
            </form>
          </div>
        </div>
      );
    };

    const MatchView = ({ reporte, matches, onClose }) => (
      <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={onClose}>
        <div className="bg-white rounded-3xl w-full max-w-md max-h-[80vh] overflow-auto p-5 shadow-soft border border-[#E07A5F]/20" onClick={e => e.stopPropagation()}>
          <div className="flex justify-between items-center mb-4"><h3 className="text-xl font-display text-[#4A3B32]">🎉 ¡Posibles matches!</h3><button onClick={onClose} className="text-2xl text-[#8B7A6B]">&times;</button></div>
          {matches.length===0 ? <p className="text-[#8B7A6B] text-sm">Aún no hay coincidencias.</p> : matches.map((m,i)=>(
            <div key={i} className="bg-[#FFF9F2] p-4 rounded-2xl border border-[#E07A5F]/10 mb-4">
              <div className="flex justify-between mb-2"><span className="font-display text-lg">{m.pet.nombre||'Mascota'}</span><span className="bg-[#E07A5F]/10 text-[#E07A5F] px-3 py-1 rounded-full text-xs">{m.score}%</span></div>
              <p className="text-xs text-[#8B7A6B]">🐾 {m.pet.raza} · 📍 {m.pet.zona}</p>
              <a href={getWhatsAppLink(m.pet.contactoTelefono, `🐾 ¡Posible match! Vi a ${m.pet.nombre||'tu mascota'} en ${m.pet.zona}.`)} target="_blank" className="mt-3 inline-flex items-center gap-2 bg-[#2D5A27] text-white px-4 py-2 rounded-full text-xs">🧡 Contactar</a>
            </div>
          ))}
          <button onClick={onClose} className="mt-2 w-full border border-[#E07A5F]/30 py-2 rounded-full text-sm text-[#8B7A6B]">Cerrar</button>
        </div>
      </div>
    );

    const App = () => {
      const [activeTab, setActiveTab] = useState('perdidos');
      const [viewMode, setViewMode] = useState('feed');
      const [stats, setStats] = useState({ totalPerdidos: 0, totalAvistamientos: 0, resueltos: 0 });
      const [matchModal, setMatchModal] = useState(null);
      const [selectedPet, setSelectedPet] = useState(null);
      const [missionOpen, setMissionOpen] = useState(false);

      useEffect(() => {
        (async () => { if (GAS_URL) { try { const r = await fetch(`${GAS_URL}?action=stats`); const j = await r.json(); if (j.ok) setStats(j.data); } catch(e) {} } })();
      }, []);

      return (
        <div className="min-h-screen pb-16 flex flex-col">
          <Header stats={stats} onOpenMission={() => setMissionOpen(true)} />
          <main className="flex-1">
            {activeTab === 'perdidos' && <FeedView type="perdidos" viewMode={viewMode} onOpenDetail={setSelectedPet} />}
            {activeTab === 'avistamientos' && <FeedView type="avistamientos" viewMode={viewMode} onOpenDetail={setSelectedPet} />}
            {activeTab === 'reportar' && <ReportForm onMatchFound={setMatchModal} onClose={() => setActiveTab('perdidos')} />}
          </main>
          <Footer />
          <BottomNavigation activeTab={activeTab} viewMode={viewMode} setViewMode={setViewMode} setActiveTab={setActiveTab} />
          <FloatingActionButton setActiveTab={setActiveTab} />
          {matchModal && <MatchView {...matchModal} onClose={() => setMatchModal(null)} />}
          {selectedPet && <DetailView pet={selectedPet} onClose={() => setSelectedPet(null)} />}
          <MissionModal isOpen={missionOpen} onClose={() => setMissionOpen(false)} />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
